<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billable Hours Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--border:#e8e6e0;--border-strong:#d0cdc5;
  --text:#1a1917;--text-secondary:#6b6760;--text-hint:#9e9b94;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
h1{font-size:24px;font-weight:500}h2{font-size:18px;font-weight:500}h3{font-size:15px;font-weight:500}
button{font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;width:100%;outline:none;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;height:80px}
.page{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.header-left p{font-size:14px;color:var(--text-secondary);margin-top:3px}
.month-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 14px}
.month-nav button{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:20px;padding:0 2px;line-height:1;display:flex;align-items:center}
.month-nav button:hover{color:var(--text)}
.month-nav span{font-weight:500;font-size:14px;min-width:100px;text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.stat-card .s-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.stat-card .s-value{font-size:20px;font-weight:500;font-variant-numeric:tabular-nums}
.stat-card .s-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.stat-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.progress-wrap{background:var(--bg);border-radius:99px;height:10px;margin-bottom:8px;overflow:hidden}
.progress-bar{height:10px;border-radius:99px;background:var(--blue);transition:width 0.4s ease}
.progress-bar.warn{background:var(--amber)}.progress-bar.over{background:var(--red)}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-hint)}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-weight:500;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:var(--blue-text)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:none;border:none;color:var(--text-secondary);padding:4px;display:inline-flex;align-items:center;border-radius:6px}
.btn-ghost:hover{color:var(--text);background:var(--bg)}
.customers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.customer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.customer-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,0.08)}
.c-name-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.c-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0}
.c-name{font-weight:500}
.c-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;padding:2px 0}
.c-lbl{color:var(--text-secondary)}.c-val{font-weight:500}.c-val-green{color:var(--green);font-weight:500}
.hours-target-bar{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.target-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-hint);margin-bottom:5px}
.mini-bar-wrap{background:var(--bg);border-radius:99px;height:5px;overflow:hidden}
.mini-bar{height:5px;border-radius:99px;transition:width 0.3s}
.mini-bar.ok{background:var(--blue)}.mini-bar.warn{background:var(--amber)}.mini-bar.over{background:var(--red)}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.detail-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:500}
.detail-month{font-size:14px;color:var(--text-secondary);font-weight:400}
.entry-group{margin-bottom:4px}
.entry-date-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border)}
.entry-date-lbl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-secondary)}
.entry-date-sum{display:flex;gap:14px;font-size:13px}
.entry-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.entry-item:last-child{border-bottom:none}
.entry-hrs{font-size:13px;font-weight:500}.entry-rev{font-size:13px;color:var(--green);margin-left:8px}
.entry-desc{font-size:12px;color:var(--text-secondary);margin-top:3px}
.entry-actions{display:flex;gap:4px;flex-shrink:0;margin-left:12px}
.empty-state{text-align:center;padding:2rem 0;color:var(--text-secondary);font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:420px;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:5px}
.field-hint{font-size:12px;color:var(--text-hint);margin-top:4px}
.hours-stepper{display:flex;align-items:center;justify-content:center;gap:20px;margin:8px 0 12px}
.step-btn{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.step-btn:hover{background:var(--border)}
.hours-big{font-size:30px;font-weight:500;font-variant-numeric:tabular-nums;text-align:center;min-width:60px}
.hours-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:2px}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.quick-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px;font-size:13px;cursor:pointer;color:var(--text);transition:all 0.1s}
.quick-btn:hover{border-color:var(--blue-text);color:var(--blue-text)}
.quick-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.modal-actions button{flex:1;padding:10px;border-radius:var(--radius);font-size:14px}
.btn-cancel-modal{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-confirm-modal{background:var(--blue);color:#fff;border:none;font-weight:500}
.btn-confirm-modal:hover{background:var(--blue-text)}
.customer-pill{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--radius);padding:10px 12px;font-size:14px;border:1px solid var(--border)}
.accordion{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.5rem;cursor:pointer;user-select:none;transition:background 0.15s}
.accordion-header:hover{background:var(--bg)}
.accordion-header-left{display:flex;align-items:center;gap:12px}
.accordion-icon{width:38px;height:38px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0}
.accordion-title{font-weight:500;font-size:15px}
.accordion-sub{font-size:13px;color:var(--text-secondary);margin-top:1px}
.accordion-chevron{color:var(--text-secondary);transition:transform 0.2s;display:flex;align-items:center}
.accordion-chevron.open{transform:rotate(180deg)}
.accordion-body{border-top:1px solid var(--border);padding:1.5rem;display:none}
.accordion-body.open{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.settings-grid .field{margin-bottom:0}
.data-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius);padding:12px 14px;display:flex;gap:10px;margin-bottom:1.25rem;align-items:flex-start}
.data-warn-text{font-size:13px;color:#92400e}
.data-warn-title{font-weight:500;color:#b45309;margin-bottom:2px}
.data-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.data-card{border-radius:var(--radius);padding:1.25rem;cursor:pointer;text-align:center}
.data-card-export{border:1.5px dashed #93c5fd;background:#f0f7ff}
.data-card-export:hover{background:#e0efff}
.data-card-import{border:1.5px dashed #6ee7b7;background:#f0fdf8}
.data-card-import:hover{background:#dcfdf0}
.data-card svg{margin-bottom:6px}
.data-card-title{font-weight:500;font-size:14px;color:var(--blue);margin-bottom:2px}
.data-card-import .data-card-title{color:var(--green)}
.data-card-sub{font-size:12px;color:var(--text-secondary)}
.data-notes{list-style:none;padding:0}
.data-notes li{font-size:13px;color:var(--text-secondary);padding:2px 0}
.data-notes li::before{content:"· ";color:var(--text-hint)}
svg.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const QUICK_HOURS=[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8];
const MONTHLY_GOAL=125;
const SK_CUSTOMERS='bht_customers';
const SK_ENTRIES='bht_entries';
const SK_SETTINGS='bht_settings';

const CURRENCIES={
  HUF:{label:'HUF',symbol:'Ft',locale:'hu-HU'},
  EUR:{label:'EUR',symbol:'€',locale:'de-DE'},
  GBP:{label:'GBP',symbol:'£',locale:'en-GB'},
  PLN:{label:'PLN',symbol:'zł',locale:'pl-PL'},
  USD:{label:'USD',symbol:'$',locale:'en-US'},
};

const ic={
  clock:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  dollar:'<svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  users:'<svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  calendar:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  plus:'<svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  edit:'<svg class="ic" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  trash:'<svg class="ic" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  back:'<svg class="ic" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>',
  download:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  upload:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
  x:'<svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  settings:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>',
  gear:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  alert:'<svg class="ic" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  wallet:'<svg class="ic" viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>',
};

function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function monthKey(y,m){return `${y}-${String(m+1).padStart(2,'0')}`}
function fmtDate(str){const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}
function fmtMoney(n){
  const cur=CURRENCIES[S.settings.currency]||CURRENCIES.HUF;
  return Number(n).toLocaleString(cur.locale)+' '+cur.label;
}
function parseN(s){return parseFloat(s)||0}
function uid(){return 'x'+Math.random().toString(36).slice(2)}

let S={
  view:'dashboard',year:new Date().getFullYear(),month:new Date().getMonth(),
  selectedCustomer:null,modal:null,_modalHours:0.5,
  customers:[],entries:{},
  settings:{defaultRate:0,currency:'HUF',baseSalary:0},
};

function loadData(){
  try{const r=localStorage.getItem(SK_CUSTOMERS);if(r)S.customers=JSON.parse(r);}catch(e){S.customers=[];}
  try{const r=localStorage.getItem(SK_ENTRIES);if(r)S.entries=JSON.parse(r);}catch(e){S.entries={};}
  try{const r=localStorage.getItem(SK_SETTINGS);if(r)S.settings={...S.settings,...JSON.parse(r)};}catch(e){}
}
function saveCustomers(){try{localStorage.setItem(SK_CUSTOMERS,JSON.stringify(S.customers));}catch(e){}}
function saveEntries(){try{localStorage.setItem(SK_ENTRIES,JSON.stringify(S.entries));}catch(e){}}
function saveSettings(){try{localStorage.setItem(SK_SETTINGS,JSON.stringify(S.settings));}catch(e){}}

function getEntries(cid,y,m){return S.entries[`${cid}::${monthKey(y,m)}`]||[];}
function setEntries(cid,y,m,arr){S.entries[`${cid}::${monthKey(y,m)}`]=arr;}
function effectiveRate(c){return c.rate||S.settings.defaultRate||0;}
function cHours(cid){return getEntries(cid,S.year,S.month).reduce((s,e)=>s+e.hours,0);}
function cRev(cid){const c=S.customers.find(x=>x.id===cid);return c?cHours(cid)*effectiveRate(c):0;}
function totalH(){return S.customers.reduce((s,c)=>s+cHours(c.id),0);}
function totalR(){return S.customers.reduce((s,c)=>s+cRev(c.id),0);}
function totalE(){return S.customers.reduce((s,c)=>s+getEntries(c.id,S.year,S.month).length,0);}

function render(){
  const app=document.getElementById('app');
  if(S.modal){renderModal(app);return;}
  if(S.view==='dashboard') renderDashboard(app);
  else renderDetail(app);
}

function renderDashboard(app){
  const th=totalH(),tr=totalR();
  const pct=Math.min(100,th/MONTHLY_GOAL*100);
  const base=S.settings.baseSalary||0;
  const totalIncome=tr+base;
  const cur=CURRENCIES[S.settings.currency]||CURRENCIES.HUF;

  app.innerHTML=`
<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>Billable hours tracker</h1>
      <p>Track your time and manage your clients</p>
    </div>
    <div class="month-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <span>${MONTHS[S.month]} ${S.year}</span>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div>
        <div class="s-label">Total hours</div>
        <div class="s-value">${th.toFixed(1)}</div>
      </div>
      <div class="stat-icon" style="background:#eff6ff;color:#2563eb">${ic.clock}</div>
    </div>
    <div class="stat-card">
      <div style="min-width:0;flex:1">
        <div class="s-label">Billable revenue</div>
        <div class="s-value" style="font-size:${tr>=10000?'15px':'18px'}">${fmtMoney(tr)}</div>
        ${base>0?`<div class="s-sub">+ ${fmtMoney(base)} base = <strong>${fmtMoney(totalIncome)}</strong> total</div>`:''}
      </div>
      <div class="stat-icon" style="background:#f0fdf4;color:#16a34a">${ic.dollar}</div>
    </div>

    <div class="stat-card">
      <div>
        <div class="s-label">Active customers</div>
        <div class="s-value">${S.customers.length}</div>
      </div>
      <div class="stat-icon" style="background:#f5f3ff;color:#7c3aed">${ic.users}</div>
    </div>
    <div class="stat-card">
      <div>
        <div class="s-label">Time entries</div>
        <div class="s-value">${totalE()}</div>
      </div>
      <div class="stat-icon" style="background:#fffbeb;color:#d97706">${ic.calendar}</div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-header" style="margin-bottom:1rem">
      <span style="font-weight:500">Monthly progress</span>
      <span style="font-size:13px;color:var(--text-secondary)">${th.toFixed(1)} / ${MONTHLY_GOAL} hours (${pct.toFixed(1)}%)</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${progressColor(pct)}"></div></div>
    <div class="progress-labels"><span>0h</span><span>${MONTHLY_GOAL}h target</span></div>
  </div>

  <div class="section-header" style="margin-bottom:1rem">
    <h2>Customers</h2>
    <button class="btn-primary" onclick="openAddCustomer()">${ic.plus} Add customer</button>
  </div>
  ${S.customers.length===0
    ?`<div class="empty-state" style="padding:3rem 0">No customers yet. Add your first customer to get started.</div>`
    :`<div class="customers-grid">${S.customers.map(renderCCard).join('')}</div>`}

  <div style="margin-top:2rem">
    <div class="accordion">
      <div class="accordion-header" onclick="toggleAccordion('settings')">
        <div class="accordion-header-left">
          <div class="accordion-icon">${ic.gear}</div>
          <div>
            <div class="accordion-title">General settings</div>
            <div class="accordion-sub">Rate, currency, salary &amp; data backup</div>
          </div>
        </div>
        <div class="accordion-chevron" id="chev-settings"><svg class="ic" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
      </div>
      <div class="accordion-body" id="body-settings">

        <p style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em">Billing</p>
        <div class="settings-grid">
          <div class="field">
            <label>Default hourly rate</label>
            <input id="s-rate" type="number" min="0" value="${S.settings.defaultRate||''}" placeholder="e.g. 1800" oninput="liveSettings()">
            <div class="field-hint">Applied to all customers</div>
          </div>
          <div class="field">
            <label>Currency</label>
            <select id="s-cur" onchange="liveSettings()">
              ${Object.keys(CURRENCIES).map(k=>`<option value="${k}"${S.settings.currency===k?' selected':''}>${CURRENCIES[k].label} (${CURRENCIES[k].symbol})</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field" style="max-width:260px;margin-bottom:1.5rem">
          <label>Base salary (monthly)</label>
          <input id="s-salary" type="number" min="0" value="${S.settings.baseSalary||''}" placeholder="e.g. 500000" oninput="liveSettings()">
          <div class="field-hint">Added to billable revenue to show total income</div>
        </div>

        <div style="border-top:1px solid var(--border);margin-bottom:1.25rem"></div>
        <p style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em">Data management</p>
        <div class="data-warn">
          <svg class="ic" viewBox="0 0 24 24" style="color:#d97706;flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <div class="data-warn-text"><div class="data-warn-title">Important: back up your data</div>Your data is stored locally in your browser. Export regularly to prevent loss when clearing browser data or switching devices.</div>
        </div>
        <div class="data-cards">
          <div class="data-card data-card-export" onclick="exportData()">
            <svg class="ic" viewBox="0 0 24 24" style="color:#2563eb;width:22px;height:22px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <div class="data-card-title">Export data</div>
            <div class="data-card-sub">Download backup file</div>
          </div>
          <div class="data-card data-card-import" onclick="importData()">
            <svg class="ic" viewBox="0 0 24 24" style="color:#16a34a;width:22px;height:22px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div class="data-card-title">Import data</div>
            <div class="data-card-sub">Restore from backup</div>
          </div>
        </div>
        <ul class="data-notes">
          <li>Export creates a JSON file with all your customers, time entries, and settings</li>
          <li>Import will replace all current data with the backup file data</li>
          <li>Keep your backup files in a safe location (cloud storage, email, etc.)</li>
        </ul>

      </div>
    </div>
  </div>
</div>`;
}

function progressColor(pct){
  const t=Math.min(1,pct/100);
  const r=Math.round(134-t*101);
  const g=Math.round(169+t*43);
  const b=Math.round(91-t*57);
  return `rgb(${r},${g},${b})`;
}

function liveSettings(){
  S.settings.defaultRate=parseN(document.getElementById('s-rate').value);
  S.settings.currency=document.getElementById('s-cur').value;
  S.settings.baseSalary=parseN(document.getElementById('s-salary').value);
  saveSettings();
  const th=totalH(),tr=totalR(),base=S.settings.baseSalary||0,totalIncome=tr+base;
  const revEl=document.querySelector('.stats-grid .stat-card:nth-child(2) .s-value');
  if(revEl) revEl.textContent=fmtMoney(tr);
}

function renderCCard(c){
  const h=cHours(c.id),rev=cRev(c.id),entries=getEntries(c.id,S.year,S.month).length;
  const rate=effectiveRate(c);
  let targetBar='';
  if(c.target){
    const pct=Math.min(100,h/c.target*100);
    const left=Math.max(0,c.target-h);
    const cls=pct>=100?'over':pct>=80?'warn':'ok';
    targetBar=`<div class="hours-target-bar">
      <div class="target-labels"><span>${h.toFixed(1)}h used</span><span>${left.toFixed(1)}h left of ${c.target}h</span></div>
      <div class="mini-bar-wrap"><div class="mini-bar ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  }
  return `<div class="customer-card" onclick="openCustomer('${c.id}')">
    <div class="c-name-row"><div class="c-dot"></div><span class="c-name">${c.name}</span></div>
    <div class="c-row"><span class="c-lbl">Hours this month:</span><span class="c-val">${h.toFixed(1)}</span></div>
    <div class="c-row"><span class="c-lbl">Revenue:</span><span class="c-val-green">${fmtMoney(rev)}</span></div>
    <div class="c-row"><span class="c-lbl">Hourly rate:</span><span class="c-val">${fmtMoney(rate)}/hr</span></div>
    <div class="c-row"><span class="c-lbl">Time entries:</span><span class="c-val">${entries}</span></div>
    ${targetBar}
  </div>`;
}

function renderDetail(app){
  const c=S.customers.find(x=>x.id===S.selectedCustomer);
  if(!c){S.view='dashboard';render();return;}
  const entries=getEntries(c.id,S.year,S.month);
  const h=entries.reduce((s,e)=>s+e.hours,0);
  const rate=effectiveRate(c);
  const rev=h*rate;

  let targetBar='';
  if(c.target){
    const pct=Math.min(100,h/c.target*100);
    const left=Math.max(0,c.target-h);
    const cls=pct>=100?'over':pct>=80?'warn':'';
    targetBar=`<div class="section-card" style="margin-bottom:1.5rem">
      <div class="section-header" style="margin-bottom:1rem">
        <span style="font-weight:500">Monthly hours target</span>
        <span style="font-size:13px;color:var(--text-secondary)">${h.toFixed(1)} / ${c.target}h (${pct.toFixed(1)}%)</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar${cls?' '+cls:''}" style="width:${pct}%"></div></div>
      <div class="progress-labels"><span>0h</span><span>${left.toFixed(1)}h remaining</span></div>
    </div>`;
  }

  const byDate={};
  entries.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  let entriesHtml=dates.length===0?`<div class="empty-state">No entries yet this month.</div>`:
    dates.map(d=>{
      const de=byDate[d];
      const dh=de.reduce((s,e)=>s+e.hours,0);
      return `<div class="entry-group">
        <div class="entry-date-hdr">
          <span class="entry-date-lbl">${ic.calendar} ${fmtDate(d)}</span>
          <span class="entry-date-sum"><span>${dh.toFixed(1)} hours</span><span style="color:var(--green)">${fmtMoney(dh*rate)}</span></span>
        </div>
        ${de.map(e=>`<div class="entry-item">
          <div>
            <span class="entry-hrs">${e.hours}h</span><span class="entry-rev">${fmtMoney(e.hours*rate)}</span>
            ${e.desc?`<div class="entry-desc">${e.desc}</div>`:''}
          </div>
          <div class="entry-actions">
            <button class="btn-ghost" onclick="openEditEntry('${c.id}','${e.id}')" title="Edit">${ic.edit}</button>
            <button class="btn-ghost" onclick="deleteEntry('${c.id}','${e.id}')" title="Delete">${ic.trash}</button>
          </div>
        </div>`).join('')}
      </div>`;
    }).join('');

  app.innerHTML=`
<div class="page">
  <div class="detail-header">
    <button class="btn-secondary" onclick="goBack()">${ic.back} Back</button>
    <div class="detail-title"><div class="c-dot"></div>${c.name}<span class="detail-month">&middot; ${MONTHS[S.month]} ${S.year}</span></div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" onclick="openEditCustomer('${c.id}')">${ic.edit} Edit</button>
      <button class="btn-secondary" style="color:var(--red);border-color:#fca5a5" onclick="deleteCustomer('${c.id}')">
        ${ic.trash} Delete
      </button>
    </div>
  </div>
  <div class="stats-grid" style="margin-bottom:1.5rem">
    <div class="stat-card"><div><div class="s-label">Hours this month</div><div class="s-value">${h.toFixed(1)}</div></div><div class="stat-icon" style="background:#eff6ff;color:#2563eb">${ic.clock}</div></div>
    <div class="stat-card"><div><div class="s-label">Revenue this month</div><div class="s-value" style="font-size:15px">${fmtMoney(rev)}</div></div><div class="stat-icon" style="background:#f0fdf4;color:#16a34a">${ic.dollar}</div></div>
    <div class="stat-card"><div><div class="s-label">Hourly rate</div><div class="s-value" style="font-size:15px">${fmtMoney(rate)}/hr${!c.rate?'<span style="font-size:11px;color:var(--text-hint);display:block">global default</span>':''}</div></div><div class="stat-icon" style="background:#f5f3ff;color:#7c3aed">${ic.dollar}</div></div>
  </div>
  ${targetBar}
  <div class="section-card">
    <div class="section-header">
      <h2>Time entries</h2>
      <button class="btn-primary" onclick="openAddEntry('${c.id}')">${ic.plus} Add time entry</button>
    </div>
    ${entriesHtml}
  </div>
</div>`;
}

function renderModal(app){
  const m=S.modal;
  let inner='';
  if(m.type==='customer'){
    const c=m.id?S.customers.find(x=>x.id===m.id):{};
    const defRate=S.settings.defaultRate||'';
    inner=`<div class="modal">
      <div class="modal-header"><h2>${m.id?'Edit customer':'Add customer'}</h2><button class="btn-ghost" onclick="closeModal()">${ic.x}</button></div>
      <div class="field"><label>Customer name</label><input id="m-name" type="text" value="${c.name||''}" placeholder="Customer name"></div>
      <div class="field"><label>Monthly hours target (optional)</label><input id="m-target" type="number" value="${c.target||''}" min="0" placeholder="e.g. 10 — leave blank if none"></div>
      <div class="modal-actions">
        <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm-modal" onclick="saveCustomer('${m.id||''}')">Save</button>
      </div>
    </div>`;
  } else if(m.type==='entry'){
    const cid=m.cid;
    const c=S.customers.find(x=>x.id===cid);
    const rate=effectiveRate(c);
    const entry=m.eid?getEntries(cid,S.year,S.month).find(e=>e.id===m.eid):{hours:0.5,date:today(),desc:''};
    const h=S._modalHours;
    inner=`<div class="modal">
      <div class="modal-header"><h2>${m.eid?'Edit time entry':'Add time entry'}</h2><button class="btn-ghost" onclick="closeModal()">${ic.x}</button></div>
      <div class="field"><label>Customer</label><div class="customer-pill"><div class="c-dot"></div>${c.name} &middot; ${fmtMoney(rate)}/hr</div></div>
      <div class="field"><label>Date</label><input id="m-date" type="date" value="${entry.date}"></div>
      <div class="field"><label>Hours</label>
        <div class="hours-stepper">
          <button class="step-btn" onclick="adjH(-0.5)">&#8722;</button>
          <div><div class="hours-big" id="hbig">${h}</div><div class="hours-sub" id="hrev">${fmtMoney(h*rate)}</div></div>
          <button class="step-btn" onclick="adjH(0.5)">+</button>
        </div>
        <div class="quick-grid">${QUICK_HOURS.map(qh=>`<button class="quick-btn${h===qh?' active':''}" onclick="setH(${qh})">${qh}h</button>`).join('')}</div>
      </div>
      <div class="field"><label>Description (optional)</label><textarea id="m-desc" placeholder="What did you work on?">${entry.desc||''}</textarea></div>
      <div class="modal-actions">
        <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm-modal" onclick="saveEntry('${cid}','${m.eid||''}')">${m.eid?'Save changes':'Add entry'}</button>
      </div>
    </div>`;
  }
  app.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">${inner}</div>`;
}

function adjH(d){
  const c=S.customers.find(x=>x.id===S.modal.cid);
  const rate=effectiveRate(c);
  S._modalHours=Math.max(0.5,Math.round((S._modalHours+d)*2)/2);
  document.getElementById('hbig').textContent=S._modalHours;
  document.getElementById('hrev').textContent=fmtMoney(S._modalHours*rate);
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===S._modalHours));
}
function setH(h){
  const c=S.customers.find(x=>x.id===S.modal.cid);
  const rate=effectiveRate(c);
  S._modalHours=h;
  document.getElementById('hbig').textContent=h;
  document.getElementById('hrev').textContent=fmtMoney(h*rate);
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===h));
}

function toggleAccordion(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  if(body&&chev){body.classList.toggle('open');chev.classList.toggle('open');}
}

function openAddCustomer(){S.modal={type:'customer'};render();}
function openEditCustomer(id){S.modal={type:'customer',id};render();}
function openAddEntry(cid){S._modalHours=0.5;S.modal={type:'entry',cid};render();}
function openEditEntry(cid,eid){
  const e=getEntries(cid,S.year,S.month).find(x=>x.id===eid);
  S._modalHours=e?e.hours:0.5;
  S.modal={type:'entry',cid,eid};render();
}
function closeModal(){S.modal=null;render();}

function saveCustomer(id){
  const name=document.getElementById('m-name').value.trim();
  const target=parseN(document.getElementById('m-target').value)||null;
  if(!name) return;
  if(id){
    const i=S.customers.findIndex(x=>x.id===id);
    if(i>=0)S.customers[i]={...S.customers[i],name,target};
  } else {
    S.customers.push({id:uid(),name,target});
  }
  saveCustomers();S.modal=null;render();
}

function saveEntry(cid,eid){
  const date=document.getElementById('m-date').value;
  const hours=S._modalHours;
  const desc=document.getElementById('m-desc').value.trim();
  const arr=getEntries(cid,S.year,S.month);
  if(eid){const i=arr.findIndex(e=>e.id===eid);if(i>=0)arr[i]={...arr[i],date,hours,desc};}
  else arr.push({id:uid(),date,hours,desc});
  setEntries(cid,S.year,S.month,arr);
  saveEntries();S.modal=null;render();
}

function deleteEntry(cid,eid){
  if(!confirm('Delete this entry?')) return;
  setEntries(cid,S.year,S.month,getEntries(cid,S.year,S.month).filter(e=>e.id!==eid));
  saveEntries();render();
}

function deleteCustomer(id){
  const c=S.customers.find(x=>x.id===id);
  if(!c) return;
  if(!confirm(`Remove "${c.name}"? They will no longer appear going forward, but all past entries are kept and you can still browse them by navigating to previous months.`)) return;
  S.customers=S.customers.filter(x=>x.id!==id);
  const currentKey=monthKey(S.year,S.month);
  Object.keys(S.entries).forEach(k=>{
    if(!k.startsWith(id+'::')) return;
    const mk=k.split('::')[1];
    if(mk>=currentKey) delete S.entries[k];
  });
  saveCustomers();saveEntries();
  S.view='dashboard';S.selectedCustomer=null;render();
}

function openCustomer(id){S.selectedCustomer=id;S.view='customer';render();}
function goBack(){S.view='dashboard';S.selectedCustomer=null;render();}
function prevMonth(){if(S.month===0){S.month=11;S.year--;}else S.month--;render();}
function nextMonth(){if(S.month===11){S.month=0;S.year++;}else S.month++;render();}

function exportData(){
  const data={customers:S.customers,entries:S.entries,settings:S.settings,exportedAt:new Date().toISOString(),version:2};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`billable-hours-backup-${today()}.json`;a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const text=await file.text();
    try{
      const data=JSON.parse(text);
      if(data.customers) S.customers=data.customers;
      if(data.entries) S.entries=data.entries;
      if(data.settings) S.settings={...S.settings,...data.settings};
      saveCustomers();saveEntries();saveSettings();render();
      alert('Data imported successfully.');
    }catch(err){alert('Could not read this file. Make sure it is a valid export.');}
  };
  input.click();
}

loadData();
S.year=new Date().getFullYear();
S.month=new Date().getMonth();
render();
</script>
</body>
</html>
