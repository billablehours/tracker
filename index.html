<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billable Hours Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="light"]{
  --bg:#f4f6f8;--surface:#fff;--border:#dde3e9;--border2:#c3ccd6;
  --text:#1a2530;--text-secondary:#5c6b7a;--text-hint:#94a3b3;
  --blue:#1860a8;--blue-dark:#0f4a87;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--purple:#1860a8;
  --radius:10px;--radius-lg:14px;
}
[data-theme="dark"]{
  --bg:#10161d;--surface:#1a232e;--border:#2a3744;--border2:#3a4a5a;
  --text:#eef2f6;--text-secondary:#9aabbb;--text-hint:#5d6f81;
  --blue:#5b9bd9;--blue-dark:#3f80c0;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;--purple:#5b9bd9;
  --radius:10px;--radius-lg:14px;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;transition:background 0.2s,color 0.2s}
h2{font-size:18px;font-weight:500}
button{font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;width:100%;outline:none;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;height:80px}
.page{max-width:860px;margin:0 auto;padding:4px 1.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-top:6px;flex-wrap:wrap;gap:12px}
.header h1{font-size:24px;font-weight:500}
.header p{font-size:14px;color:var(--text-secondary);margin-top:3px}
.header-right{display:flex;align-items:center;gap:10px}
.month-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 14px}
.month-nav button{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:20px;padding:0 4px;line-height:1}
.month-nav button:hover{color:var(--text)}
.month-nav span{font-weight:500;font-size:14px;min-width:100px;text-align:center}
.theme-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.theme-btn:hover{color:var(--text);background:var(--bg)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.s-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.s-value{font-size:20px;font-weight:500}
.s-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.stat-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.progress-wrap{background:var(--bg);border-radius:99px;height:10px;margin-bottom:8px;overflow:hidden}
.progress-bar{height:10px;border-radius:99px;transition:width 0.4s,background 0.4s}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-hint)}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-weight:500;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:none;border:none;color:var(--text-secondary);padding:4px;display:inline-flex;align-items:center;border-radius:6px}
.btn-ghost:hover{color:var(--text);background:var(--bg)}
.customers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.customer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;cursor:pointer;transition:border-color 0.15s;position:relative}
.customer-card:hover{border-color:var(--blue)}
.customer-card.archived-card{opacity:0.7;border-style:dashed}
.card-x{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:none;border:none;color:var(--text-hint);font-size:16px;display:none;align-items:center;justify-content:center;line-height:1;padding:0;cursor:pointer}
.card-x:hover{color:var(--red)}
.customer-card:hover .card-x{display:flex}
.c-name-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.c-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0}
.c-dot.archived{background:var(--text-hint)}
.c-name{font-weight:500}
.c-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.c-lbl{color:var(--text-secondary)}.c-val{font-weight:500}.c-val-green{color:var(--green);font-weight:500}
.target-bar{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.target-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-hint);margin-bottom:5px}
.mini-bar-wrap{background:var(--bg);border-radius:99px;height:5px;overflow:hidden}
.mini-bar{height:5px;border-radius:99px;transition:width 0.3s}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.detail-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:500}
.detail-month{font-size:14px;color:var(--text-secondary);font-weight:400}
.entry-group{margin-bottom:4px}
.entry-date-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border)}
.entry-date-lbl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-secondary)}
.entry-date-sum{display:flex;gap:14px;font-size:13px}
.entry-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.entry-item:last-child{border-bottom:none}
.entry-hrs{font-size:13px;font-weight:500}.entry-rev{font-size:13px;color:var(--green);margin-left:8px}
.entry-desc{font-size:12px;color:var(--text-secondary);margin-top:3px}
.entry-actions{display:flex;gap:4px;flex-shrink:0;margin-left:12px}
.empty-state{text-align:center;padding:2rem 0;color:var(--text-secondary);font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:420px;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:5px}
.field-hint{font-size:12px;color:var(--text-hint);margin-top:4px}
.stepper{display:flex;align-items:center;justify-content:center;gap:20px;margin:8px 0 12px}
.step-btn{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.step-btn:hover{background:var(--border)}
.h-big{font-size:30px;font-weight:500;text-align:center;min-width:60px;color:var(--text)}
.h-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:2px}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.quick-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px;font-size:13px;cursor:pointer;color:var(--text)}
.quick-btn:hover{border-color:var(--blue);color:var(--blue)}
.quick-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.timer-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:1.5rem;display:flex;align-items:center;gap:14px}
.timer-display{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;color:var(--text);min-width:90px}
.timer-display.running{color:var(--blue)}
.timer-bill{font-size:13px;color:var(--text-secondary);flex:1;min-width:0}
.timer-bill strong{color:var(--text);font-size:15px}
.btn-timer-start{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-timer-stop{background:#ef4444;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-timer-stop:hover{background:#dc2626}
.btn-timer-start:hover{background:#1555a0}
.btn-timer-discard{background:none;border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer}
.btn-timer-discard:hover{border-color:var(--text-secondary)}
.btn-timer-pause{background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer}
.btn-timer-pause:hover{background:#d97706}
.timer-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.modal-actions button{flex:1;padding:10px;border-radius:var(--radius);font-size:14px}
.btn-cancel-m{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-ok-m{background:var(--blue);color:#fff;border:none;font-weight:500}
.btn-ok-m:hover{background:var(--blue-dark)}
.cpill{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--radius);padding:10px 12px;font-size:14px;border:1px solid var(--border)}
.accordion{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.5rem;cursor:pointer;user-select:none;transition:background 0.15s}
.acc-hdr:hover{background:var(--bg)}
.acc-hdr-left{display:flex;align-items:center;gap:12px}
.acc-icon{width:38px;height:38px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0}
.acc-title{font-weight:500;font-size:15px}
.acc-sub{font-size:13px;color:var(--text-secondary);margin-top:1px}
.acc-chev{color:var(--text-secondary);transition:transform 0.2s;display:flex;align-items:center}
.acc-chev.open{transform:rotate(180deg)}
.acc-body{border-top:1px solid var(--border);padding:1.5rem;display:none}
.acc-body.open{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.settings-grid .field{margin-bottom:0}
.data-warn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;gap:10px;margin-bottom:1.25rem;align-items:flex-start}
.data-warn p{font-size:13px;color:var(--amber)}
.data-warn strong{font-weight:600}
.data-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.data-card{border-radius:var(--radius);padding:1.25rem;cursor:pointer;text-align:center;transition:opacity 0.15s}
.dc-exp{border:1.5px dashed var(--blue);background:var(--bg)}.dc-exp:hover{opacity:0.7}
.dc-imp{border:1.5px dashed var(--green);background:var(--bg)}.dc-imp:hover{opacity:0.7}
.dc-title{font-weight:500;font-size:14px;margin-top:6px;margin-bottom:2px}
.dc-exp .dc-title{color:var(--blue)}.dc-imp .dc-title{color:var(--green)}
.dc-sub{font-size:12px;color:var(--text-secondary)}
.data-notes{list-style:none;padding:0}
.data-notes li{font-size:13px;color:var(--text-secondary);padding:2px 0}
.data-notes li::before{content:"· ";color:var(--text-hint)}
.sec-label{font-size:13px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px}
.divider{border-top:1px solid var(--border);margin:1.25rem 0}
.badge-archived{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--bg);color:var(--text-hint);border:1px solid var(--border)}
.c-logo{width:44px;height:44px;border-radius:8px;object-fit:contain;border:1px solid var(--border);background:var(--bg);flex-shrink:0}
.c-logo-placeholder{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-hint);font-size:11px;font-weight:500;cursor:pointer;text-align:center;line-height:1.2}
.c-logo-placeholder:hover{border-color:var(--blue);color:var(--blue)}
.logo-upload-wrap{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.logo-preview{width:56px;height:56px;border-radius:8px;object-fit:contain;border:1px solid var(--border);background:var(--bg)}
.logo-preview-placeholder{width:56px;height:56px;border-radius:8px;border:1px dashed var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-hint);font-size:11px;text-align:center;line-height:1.4;padding:4px}
svg.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const QUICK=[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8];
const SK={C:'bht_customers',A:'bht_archived',E:'bht_entries',S:'bht_settings'};

const CURR={
  HUF:{label:'HUF',symbol:'Ft',locale:'hu-HU'},
  EUR:{label:'EUR',symbol:'€',locale:'de-DE'},
  GBP:{label:'GBP',symbol:'£',locale:'en-GB'},
  PLN:{label:'PLN',symbol:'zł',locale:'pl-PL'},
  USD:{label:'USD',symbol:'$',locale:'en-US'},
};

const ic={
  clock:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  dollar:'<svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  users:'<svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  calendar:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  plus:'<svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  edit:'<svg class="ic" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  trash:'<svg class="ic" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  back:'<svg class="ic" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>',
  download:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  upload:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
  x:'<svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  gear:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  moon:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  sun:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  warn:'<svg class="ic" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  copy:'<svg class="ic" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  clipboard:'<svg class="ic" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>',
  excel:'<svg class="ic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>',
};

function today(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function mk(y,m){return `${y}-${p2(m+1)}`}
function fmtDate(s){const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}
function fmtMoney(n){const c=CURR[S.cfg.currency]||CURR.HUF;return Number(n).toLocaleString(c.locale)+' '+c.label}
function pN(s){return parseFloat(s)||0}

function findC(id){return S.active.find(c=>c.id===id)||S.archived.find(c=>c.id===id)||null;}
function isArchived(id){return !!S.archived.find(c=>c.id===id);}
function eKey(cid,y,m){return `${cid}::${mk(y,m)}`}
function getE(cid,y,m){return S.entries[eKey(cid,y,m)]||[];}
function setE(cid,y,m,arr){S.entries[eKey(cid,y,m)]=arr;}
function rate(c,year,month){
  // If year/month given, look up historical default rate; else use current cfg
  const defRate = (year!=null && month!=null) ? rateForMonth(year,month) : (S.cfg.defaultRate||0);
  return c.rate||defRate;
}
function rateForMonth(year,month){
  const key=year+'-'+p2(month+1);
  const hist=(S.rateHistory||[]).slice().sort((a,b)=>a.from>b.from?-1:1);
  for(const h of hist){if(h.from<=key)return h.rate||0;}
  return S.cfg.defaultRate||0;
}
function salaryForMonth(year,month){
  const key=year+'-'+p2(month+1);
  const hist=(S.salaryHistory||[]).slice().sort((a,b)=>a.from>b.from?-1:1);
  for(const h of hist){if(h.from<=key)return h.salary||0;}
  return S.cfg.baseSalary||0;
}
function cHours(cid){return getE(cid,S.year,S.month).reduce((s,e)=>s+e.hours,0);}
function cRev(cid){const c=findC(cid);if(!c)return 0;return cHours(cid)*rate(c);}

// Global overtime: hours beyond monthly goal get 2x
// Returns {billable, overtime, total} revenue for the whole month
function globalRevBreakdown(vc){
  const goal=S.cfg.monthlyGoal||125;
  const th=vc.reduce((s,c)=>s+cHours(c.id),0);
  const tr=vc.reduce((s,c)=>s+cRev(c.id),0);
  if(th<=goal) return {billable:tr,overtime:0,total:tr,overHours:0};
  // ratio of normal vs overtime hours
  const overHours=th-goal;
  const normalHours=goal;
  // average rate weighted by hours
  const avgRate=th>0?tr/th:0;
  const overtime=overHours*avgRate*1.0; // the extra 1.0x on top of normal pay = 2x total
  return {billable:tr,overtime,total:tr+overtime,overHours};
}

// Same as globalRevBreakdown but for an arbitrary year/month (used by analytics charts)
function revBreakdownForMonth(year,month,customers){
  const goal=S.cfg.monthlyGoal||125;
  const hoursOf=cid=>getE(cid,year,month).reduce((s,e)=>s+e.hours,0);
  const revOf=c=>hoursOf(c.id)*rate(c);
  const th=customers.reduce((s,c)=>s+hoursOf(c.id),0);
  const tr=customers.reduce((s,c)=>s+revOf(c),0);
  if(th<=goal) return {billable:tr,overtime:0,total:tr,overHours:0};
  const overHours=th-goal;
  const avgRate=th>0?tr/th:0;
  const overtime=overHours*avgRate*1.0;
  return {billable:tr,overtime,total:tr+overtime,overHours};
}

function getWeekRange(){
  const now=new Date();const dow=now.getDay();const diffToMon=(dow===0?-6:1-dow);
  const monday=new Date(now);monday.setDate(now.getDate()+diffToMon);monday.setHours(0,0,0,0);
  const friday=new Date(monday);friday.setDate(monday.getDate()+4);friday.setHours(23,59,59,999);
  return {monday,friday};
}
// Full week including Saturday/Sunday, used for hour totals (in case of weekend work)
function getFullWeekRange(){
  const {monday}=getWeekRange();
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  return {monday,sunday};
}
function weekKey(){const {monday}=getWeekRange();return `${monday.getFullYear()}-${p2(monday.getMonth()+1)}-${p2(monday.getDate())}`;}
function getWeekExpected(){
  try{const r=localStorage.getItem('bht_week_expected');if(r){const o=JSON.parse(r);if(o[weekKey()]!==undefined)return o[weekKey()];}
  }catch(e){}return 40;
}
function setWeekExpected(val){
  let o={};try{const r=localStorage.getItem('bht_week_expected');if(r)o=JSON.parse(r);}catch(e){}
  o[weekKey()]=val;try{localStorage.setItem('bht_week_expected',JSON.stringify(o));}catch(e){}
}
function weekHours(vc){
  const {monday,sunday}=getFullWeekRange();let total=0;
  const monStr=`${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
  const sunStr=`${sunday.getFullYear()}-${String(sunday.getMonth()+1).padStart(2,'0')}-${String(sunday.getDate()).padStart(2,'0')}`;
  vc.forEach(c=>{[-1,0,1].forEach(off=>{
    let y=S.year,m=S.month+off;if(m<0){m=11;y--;}if(m>11){m=0;y++;}
    getE(c.id,y,m).forEach(e=>{if(e.date>=monStr&&e.date<=sunStr)total+=e.hours;});
  });});return total;
}
function weekHoursForCustomer(cid){
  const {monday,sunday}=getFullWeekRange();let total=0;
  const monStr2=`${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
  const sunStr2=`${sunday.getFullYear()}-${String(sunday.getMonth()+1).padStart(2,'0')}-${String(sunday.getDate()).padStart(2,'0')}`;
  [-1,0,1].forEach(off=>{
    let y=S.year,m=S.month+off;if(m<0){m=11;y--;}if(m>11){m=0;y++;}
    getE(cid,y,m).forEach(e=>{if(e.date>=monStr2&&e.date<=sunStr2)total+=e.hours;});
  });
  return total;
}
function visibleCustomers(){
  const now=new Date();const isCurrent=(S.year===now.getFullYear()&&S.month===now.getMonth());
  if(isCurrent)return S.active;
  return [...S.active,...S.archived].filter(c=>getE(c.id,S.year,S.month).length>0);
}

// Highly distinct palette (avoids adjacent similar hues like orange/amber together)
const CHART_PALETTE=['#1860a8','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#65a30d','#4338ca','#0d9488','#b91c1c','#ca8a04','#2563eb','#9333ea','#059669'];
function colorForCustomer(cid){
  const c=findC(cid);
  if(c&&c.color)return c.color;
  // Fallback: stable palette by insertion order
  const allIds=[...S.active,...S.archived].map(c=>c.id).sort();
  const idx=allIds.indexOf(cid);
  return CHART_PALETTE[(idx>=0?idx:0)%CHART_PALETTE.length];
}

// Returns months for the analytics year: full year if past, YTD if current
function yearToDateMonths(){
  const now=new Date();
  const currentYear=now.getFullYear();
  const maxMonth=S.analyticsYear<currentYear?11:now.getMonth();
  const months=[];
  for(let m=0;m<=maxMonth;m++){
    months.push({year:S.analyticsYear,month:m});
  }
  return months;
}
function analyticsYearHasData(y){
  const all=[...S.active,...S.archived];
  for(let m=0;m<12;m++){
    for(const c of all){if(getE(c.id,y,m).length>0)return true;}
  }
  return false;
}

// Builds chart data: for each month year-to-date, hours per customer (active+archived, with entries)
function buildAnalyticsData(){
  const months=yearToDateMonths();
  const allCustomersMap={};
  [...S.active,...S.archived].forEach(c=>{allCustomersMap[c.id]=c;});

  const monthData=months.map(({year,month})=>{
    const segments=[];
    let total=0;
    Object.keys(allCustomersMap).forEach(cid=>{
      const h=getE(cid,year,month).reduce((s,e)=>s+e.hours,0);
      if(h>0){
        segments.push({cid,name:allCustomersMap[cid].name,hours:h});
        total+=h;
      }
    });
    segments.sort((a,b)=>b.hours-a.hours);
    return {year,month,label:MONTHS[month].slice(0,3),total,segments};
  });

  // collect unique customers that appear anywhere in the year-to-date window, for the legend
  const legendMap={};
  monthData.forEach(m=>m.segments.forEach(s=>{legendMap[s.cid]=s.name;}));
  const legend=Object.keys(legendMap).map(cid=>({cid,name:legendMap[cid]}));

  return {monthData,legend};
}

// Builds income chart data: for each YTD month's WORK, the income is received 2 months later.
// So the bar labeled "August" shows income generated by hours worked in June (paid in August).
function buildIncomeData(){
  const allCustomers=[...S.active,...S.archived];
  // Iterate over months actually WORKED (Jan through the currently viewed month),
  // then project each one forward 2 months to find when it gets paid.
  const workMonths=yearToDateMonths();
  const monthData=workMonths.map(({year,month})=>{
    let payMonth=month+2,payYear=year;
    if(payMonth>11){payMonth-=12;payYear++;}
    const base=salaryForMonth(year,month);
    const rb=revBreakdownForMonth(year,month,allCustomers);
    const total=rb.total+base;
    return {year:payYear,month:payMonth,label:MONTHS[payMonth].slice(0,3)+' '+String(payYear).slice(2),total,workLabel:MONTHS[month].slice(0,3)+' '+year};
  });
  return {monthData};
}

function renderIncomeChart(){
  const {monthData}=buildIncomeData();
  const maxTotal=Math.max(1,...monthData.map(m=>m.total));
  const minTotal=monthData.length>0?Math.min(...monthData.filter(m=>m.total>0).map(m=>m.total)):0;
  const numMonths=monthData.length;
  const topPad=28;
  const chartH=220;
  const chartW=Math.max(360,numMonths*74);
  const step=maxTotal>200000?50000:maxTotal>20000?5000:maxTotal>2000?500:20;
  const niceMax=Math.ceil(maxTotal/step)*step||step;
  // Set a smart minimum: floor to nearest step below minTotal, with some breathing room
  const rawMin=minTotal>0?Math.floor((minTotal*0.97)/step)*step:0;
  const niceMin=Math.max(0,rawMin);
  const range=niceMax-niceMin||1;
  const xFor=i=>numMonths===1?chartW/2:(i/(numMonths-1))*chartW;
  const yFor=v=>(chartH+topPad)-(((v-niceMin)/range)*chartH);

  const points=monthData.map((m,i)=>({x:xFor(i),y:yFor(m.total),m}));
  const linePoints=points.map(p=>`${p.x},${p.y}`).join(' ');

  let line='';
  if(points.length>1){
    line=`<polyline points="${linePoints}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>`;
  }

  const dots=points.map(p=>{
    const safeLabel=p.m.label.replace(/'/g,"\\'");
    const safeWork=p.m.workLabel.replace(/'/g,"\\'");
    const value=fmtMoney(p.m.total).replace(/'/g,"\\'");
    return `<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="var(--green)" stroke="var(--surface)" stroke-width="2" style="cursor:pointer"
        onmousemove="chartTooltip(event,'Paid in ${safeLabel}','${value}')"
        onmouseleave="hideChartTooltip()"></circle>
      <text x="${p.x}" y="${chartH+topPad+22}" text-anchor="middle" font-size="12" fill="var(--text-secondary)" font-family="'DM Sans',sans-serif">${p.m.label}</text>
      ${p.m.total>0?`<text x="${p.x}" y="${Math.max(p.y-10,12)}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text)" font-family="'DM Sans',sans-serif">${fmtMoney(p.m.total)}</text>`:''}`;
  }).join('');

  let gridLines='';
  [0,0.25,0.5,0.75,1].forEach(frac=>{
    const y=(chartH+topPad)-(frac*chartH);
    const val=Math.round(niceMin+range*frac);
    gridLines+=`<line x1="0" y1="${y}" x2="${chartW}" y2="${y}" stroke="var(--border)" stroke-width="1"/>
      <text x="-8" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text-hint)" font-family="'DM Sans',sans-serif">${val>=1000?(val/1000)+'k':val}</text>`;
  });

  return `
    <div style="overflow-x:auto">
      <svg viewBox="-55 0 ${chartW+80} ${chartH+topPad+50}" width="100%" style="min-width:${Math.min(480,chartW)}px;max-width:760px;display:block;margin:0 auto" font-family="'DM Sans',sans-serif">
        ${gridLines}
        ${line}
        ${dots}
      </svg>
    </div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:12px;color:var(--text-hint)">
      The line shows income received each month — earned from hours worked 2 months earlier (e.g. August income reflects June work).
    </div>
  `;
}

function renderAnalyticsChart(){
  const {monthData,legend}=buildAnalyticsData();
  const maxTotal=Math.max(1,...monthData.map(m=>m.total));
  const numMonths=monthData.length;
  const topPad=28; // space for the total-hours label above the tallest bar
  const chartH=220,barW=Math.min(64,560/numMonths);
  const chartW=Math.max(360,numMonths*(barW+20));
  const gap=(chartW-barW*numMonths)/(numMonths+1);
  const niceMax=Math.ceil(maxTotal/20)*20||20;

  let bars='';
  monthData.forEach((m,i)=>{
    const x=gap+i*(barW+gap);
    let yCursor=chartH+topPad;
    let segHtml='';
    m.segments.forEach(seg=>{
      const segH=(seg.hours/niceMax)*chartH;
      const y=yCursor-segH;
      const safeName=seg.name.replace(/'/g,"\\'");
      segHtml+=`<rect x="${x}" y="${y}" width="${barW}" height="${segH}" fill="${colorForCustomer(seg.cid)}" rx="2" style="cursor:pointer"
        onmousemove="chartTooltip(event,'${safeName}','${seg.hours.toFixed(1)}h')"
        onmouseleave="hideChartTooltip()"></rect>`;
      yCursor=y;
    });
    const labelY=chartH+topPad+20;
    const totalY=(chartH+topPad)-((m.total/niceMax)*chartH)-8;
    bars+=`${segHtml}
      <text x="${x+barW/2}" y="${labelY}" text-anchor="middle" font-size="12" fill="var(--text-secondary)" font-family="'DM Sans',sans-serif">${m.label}</text>
      ${m.total>0?`<text x="${x+barW/2}" y="${Math.max(totalY,12)}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text)" font-family="'DM Sans',sans-serif">${m.total.toFixed(1)}h</text>`:''}
    `;
  });

  let gridLines='';
  [0,0.25,0.5,0.75,1].forEach(frac=>{
    const y=(chartH+topPad)-(frac*chartH);
    const val=Math.round(niceMax*frac);
    gridLines+=`<line x1="0" y1="${y}" x2="${chartW}" y2="${y}" stroke="var(--border)" stroke-width="1"/>
      <text x="-8" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text-hint)" font-family="'DM Sans',sans-serif">${val}h</text>`;
  });

  const legendHtml=legend.length===0?'<span style="font-size:13px;color:var(--text-hint)">No data in this period</span>':
    legend.map(l=>`<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);margin-right:14px;margin-bottom:6px">
      <span style="width:10px;height:10px;border-radius:3px;background:${colorForCustomer(l.cid)};display:inline-block"></span>${l.name}
    </span>`).join('');

  return `
    <div style="overflow-x:auto">
      <svg viewBox="-40 0 ${chartW+20} ${chartH+topPad+40}" width="100%" style="min-width:${Math.min(480,chartW)}px;max-width:760px;display:block;margin:0 auto" font-family="'DM Sans',sans-serif">
        ${gridLines}
        ${bars}
      </svg>
    </div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap">${legendHtml}</div>
  `;
}

function renderCCard(c){
  const h=cHours(c.id),rev=cRev(c.id),arch=isArchived(c.id);
  let bar='';
  if(c.target){
    const p=Math.min(100,h/c.target*100),left=Math.max(0,c.target-h);
    bar=`<div class="target-bar">
      <div class="target-labels"><span>${h.toFixed(1)}h used</span><span>${left.toFixed(1)}h left of ${c.target}h</span></div>
      <div class="mini-bar-wrap"><div class="mini-bar" style="width:${p}%;background:${pColor(p)}"></div></div>
    </div>`;
  }
  return `<div class="customer-card${arch?' archived-card':''}" onclick="openDetail('${c.id}')">
    ${arch?'':`<button class="card-x" onclick="event.stopPropagation();archiveCustomer('${c.id}')" title="Remove">&#x2715;</button>`}
    <div class="c-name-row">
      ${c.logo?`<img class="c-logo" src="${c.logo}" alt="${c.name}">`:`<div class="c-dot${arch?' archived':''}" style="${arch?'':`background:${colorForCustomer(c.id)}`}"></div>`}
      <span class="c-name">${c.name}</span>
      ${arch?'<span class="badge-archived">Archived</span>':''}
      ${(S.timers&&S.timers[c.id]&&S.timers[c.id].running)?'<span class="timer-dot" title="Timer running"></span>':''}
    </div>
    <div class="c-row"><span class="c-lbl">Hours this month:</span><span class="c-val">${h.toFixed(1)}</span></div>
    <div class="c-row"><span class="c-lbl">Revenue:</span><span class="c-val-green">${fmtMoney(rev)}</span></div>
    <div class="c-row"><span class="c-lbl">This week:</span><span class="c-val">${weekHoursForCustomer(c.id).toFixed(1)}h</span></div>
    ${bar}
  </div>`;
}

  const arch=isArchived(c.id);
  const entries=getE(c.id,S.year,S.month);
  const h=entries.reduce((s,e)=>s+e.hours,0);
  const r=rate(c),rev=cRev(c.id);
  let tBar='';
  if(c.target){
    const p=Math.min(100,h/c.target*100);
    tBar=`<div class="section-card" style="margin-bottom:1.5rem">
      <div class="section-header" style="margin-bottom:1rem">
        <span style="font-weight:500">Monthly hours target</span>

  const entriesHtml=dates.length===0?'<div class="empty-state">No entries yet this month.</div>'

          <div class="entry-actions">
            ${arch?'':`<button class="btn-ghost" onclick="copyEntryToToday('${c.id}','${e.id}')" title="Copy to today">${ic.copy}</button>`}
            ${arch?'':`<button class="btn-ghost" onclick="openEditEntry('${c.id}','${e.id}')">${ic.edit}</button>`}
            ${arch?'':`<button class="btn-ghost" onclick="deleteEntry('${c.id}','${e.id}')">${ic.trash}</button>`}
          </div>

  app.innerHTML=`
<div class="page">

    <button class="btn-secondary" onclick="goBack()">${ic.back} Back</button>

      ${c.logo?`<img class="c-logo" src="${c.logo}" alt="${c.name}" style="width:36px;height:36px">`:`<div class="c-dot${arch?' archived':''}" style="${arch?'':`background:${colorForCustomer(c.id)}`}"></div>`}

const ds=`${dd.getFullYear()}-${p2(dd.getMonth()+1)}-${p2(dd.getDate())}`;      const isSelected=(entry.date||today())===ds;

    }

      <div class="modal-header"><h2>${m.eid?'Edit time entry':'Add time entry'}</h2><button class="btn-ghost" onclick="closeModal()">${ic.x}</button></div>
      <div class="field"><label>Customer</label><div class="cpill"><div class="c-dot" style="background:${colorForCustomer(c.id)}"></div>${c.name} &middot; ${fmtMoney(r)}/hr</div></div>

    const normalHours=Math.min(th,goal);
    const overHours=Math.max(0,th-goal);
    const normalRev=g.billable-(overHours>0?overHours*(g.billable/th):0);
    const r=th>0?g.billable/th:0;

    const expected=getWeekExpected();
    const nonBillable=Math.max(0,expected-billable);
    const vc=visibleCustomers();
    const {monday}=getFullWeekRange();
    // Build per-day breakdown
    const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri'];
    let dayRows='';
    for(let d=0;d<5;d++){
      const day=new Date(monday);day.setDate(monday.getDate()+d);
      const dateStr=`${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;

      vc.forEach(c=>{

      </div>`;
    }
    inner=`<div class="modal">
      <div class="modal-header"><h2>This week's hours</h2><button class="btn-ghost" onclick="closeModal()">${ic.x}</button></div>
      <div class="field">
        <label>Billable hours logged this week</label>

        <button class="btn-ok-m" onclick="saveWeekExpected()">Save</button>

  }
  app.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">${inner}</div>`;
}

function saveRateHistory(){
  // Called on Save — stamps current month into history so past data is unaffected
  const now=new Date();
  const key=now.getFullYear()+'-'+p2(now.getMonth()+1);
  const newRate=pN(document.getElementById('s-rate').value)||0;
  const newSalary=pN(document.getElementById('s-sal').value)||0;
  if(!S.rateHistory)S.rateHistory=[];
  if(!S.salaryHistory)S.salaryHistory=[];
  // Only add a new entry if the value actually changed vs latest entry
  const latestRate=(S.rateHistory.slice().sort((a,b)=>b.from.localeCompare(a.from))[0]||{}).rate;
  const latestSalary=(S.salaryHistory.slice().sort((a,b)=>b.from.localeCompare(a.from))[0]||{}).salary;
  if(newRate!==latestRate){
    S.rateHistory=S.rateHistory.filter(h=>h.from!==key);
    S.rateHistory.push({from:key,rate:newRate});
  }
  if(newSalary!==latestSalary){
    S.salaryHistory=S.salaryHistory.filter(h=>h.from!==key);
    S.salaryHistory.push({from:key,salary:newSalary});
  }
  saveCfg();
}

function copyWeeklyComments(cid){
  const {monday}=getWeekRange();
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    days.push(`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`);
  }
  const seen=new Set();
  const comments=[];
  days.forEach(dateStr=>{
    const y=parseInt(dateStr.slice(0,4)),m=parseInt(dateStr.slice(5,7))-1;
    getE(cid,y,m).forEach(e=>{
      if(e.date!==dateStr)return;
      const desc=(e.desc||'').trim();
      if(!desc)return;
      const normalized=desc.toLowerCase().replace(/\s+/g,' ');
      if(seen.has(normalized))return;
      seen.add(normalized);
      comments.push(desc);
    });
  });
  const text=comments.join(' + ');
  if(!text){showToast('No comments found for this week');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      showToast('Comments copied');
    }).catch(()=>{fallbackCopy(text);});
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('Comments copied');}
  catch(e){alert('Could not copy automatically. Here are the comments:\n\n'+text);}
  document.body.removeChild(ta);
}

// ── TIMER ──────────────────────────────────────────────
// ── TIMER (multi-customer, pause, comment) ─────────────
// S.timers = { [cid]: {start, elapsed, running, comment} }
let _timerIntervals={};

function timerGet(cid){return S.timers&&S.timers[cid]?S.timers[cid]:null;}

function timerElapsed(cid){
  const t=timerGet(cid);if(!t)return 0;
  if(!t.running)return t.elapsed;
  return t.elapsed+(Date.now()-t.start);
}

function timerBillable(ms){
  const mins=ms/60000;
  if(mins<15)return 0;
  return Math.ceil(mins/30)*0.5;
}

function timerFmt(ms){
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600);
  const m=Math.floor((s%3600)/60);
  const sec=s%60;
  return h>0
    ?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    :`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function billLabel(ms,lastAutoBill){
  const b=timerBillable(ms);
  const logged=lastAutoBill||0;
  if(b===0)return '<span style="color:var(--text-secondary)">Under 15 min — auto-logs at 15 min</span>';
  if(logged>0&&b===logged){
    // between thresholds — show next milestone
    const next=logged+0.5;
    const minsToNext=Math.round((next*30)-(ms/60000));
    return '<span style="color:#16a34a">✓ Auto-logged '+logged+'h</span> · next at '+next+'h (~'+minsToNext+' min)';
  }
  return 'Auto-logs as <strong>'+b+'h</strong>';
}

function renderTimerBar(cid,arch){
  if(arch)return '';
  if(!S.timers)S.timers={};
  const t=timerGet(cid);
  if(!t){
    return `<div class="timer-bar">
      <div>
        <div class="timer-display">00:00</div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">Start timer to track this session</div>
      </div>
      <input id="tc-${cid}" type="text" placeholder="What are you working on?" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--text)">
      <button class="btn-timer-start" onclick="timerStart('${cid}')">▶ Start</button>
    </div>`;
  }
  const ms=timerElapsed(cid);
  const bl=billLabel(ms,t.lastAutoBill);
  const comment=t.comment||'';
  return `<div class="timer-bar" id="timer-bar-${cid}">
    <div>
      <div class="timer-display${t.running?' running':''}" id="td-${cid}">${timerFmt(ms)}</div>
      <div style="font-size:11px;margin-top:2px" id="tbl-${cid}">${bl}</div>
    </div>
    <input id="tc-${cid}" type="text" placeholder="What are you working on?" value="${comment.replace(/"/g,'&quot;')}"
      oninput="timerSetComment('${cid}',this.value)"
      style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--text)">
    <div style="display:flex;gap:6px">
      ${t.running
        ?`<button class="btn-timer-stop" style="background:#f59e0b" onclick="timerPause('${cid}')">⏸ Pause</button>
           <button class="btn-timer-stop" onclick="timerStop('${cid}')">■ Log</button>`
        :`<button class="btn-timer-start" onclick="timerResume('${cid}')">▶ Resume</button>
           <button class="btn-timer-stop" onclick="timerStop('${cid}')">■ Log</button>`
      }
      <button class="btn-timer-discard" onclick="timerDiscard('${cid}')">✕ Discard</button>
    </div>
  </div>`;
}

function timerSetComment(cid,val){
  if(!S.timers)S.timers={};
  if(S.timers[cid])S.timers[cid].comment=val;
}

function timerStart(cid){
  if(!S.timers)S.timers={};
  // grab comment from input if present
  const inp=document.getElementById('tc-'+cid);
  S.timers[cid]={start:Date.now(),elapsed:0,running:true,comment:inp?inp.value:''};
  _startTimerTick(cid);
  render();
}

function timerResume(cid){
  const t=timerGet(cid);if(!t)return;
  t.start=Date.now();t.running=true;
  _startTimerTick(cid);
  // re-render just the bar buttons without full render
  const bar=document.getElementById('timer-bar-'+cid);
  if(bar){const c=findC(cid);bar.outerHTML=renderTimerBar(cid,false);}
}

function timerPause(cid){
  const t=timerGet(cid);if(!t||!t.running)return;
  t.elapsed+=Date.now()-t.start;
  t.running=false;
  clearInterval(_timerIntervals[cid]);delete _timerIntervals[cid];
  showToast('Timer paused');
  render();
}

function timerStop(cid){
  const t=timerGet(cid);if(!t)return;
  if(t.running){t.elapsed+=Date.now()-t.start;t.running=false;}
  clearInterval(_timerIntervals[cid]);delete _timerIntervals[cid];
  const ms=t.elapsed;
  const bill=timerBillable(ms);
  if(bill===0){
    showToast('Under 15 min — not billable yet. Pause or keep going.');
    t.running=false;render();return;
  }
  const comment=t.comment||'';
  // Remove the auto-logged entry if one exists — the modal entry will replace it
  if(t.autoLogId){
    const d=today();const dp=d.split('-');
    const yr=parseInt(dp[0]),mo=parseInt(dp[1])-1;
    const arr=getE(cid,yr,mo);
    const idx=arr.findIndex(e=>e.id===t.autoLogId);
    if(idx>=0){arr.splice(idx,1);setE(cid,yr,mo,arr);saveEntries();}
  }
  delete S.timers[cid];
  S.mh=bill;
  S._timerComment=comment;
  S.modal={type:'entry',cid,fromTimer:true};
  render();
}

function timerDiscard(cid){
  if(!S.timers)return;
  delete S.timers[cid];
  clearInterval(_timerIntervals[cid]);delete _timerIntervals[cid];
  showToast('Timer discarded');
  render();
}

function timerAutoLog(cid,bill){
  const t=timerGet(cid);
  if(!t)return;
  const comment=t.comment||'';
  const d=today();
  const dateParts=d.split('-');
  const yr=parseInt(dateParts[0]),mo=parseInt(dateParts[1])-1;
  const arr=getE(cid,yr,mo);
  // If we already have an auto-logged entry for this timer session, UPDATE it
  if(t.autoLogId){
    const idx=arr.findIndex(e=>e.id===t.autoLogId);
    if(idx>=0){
      arr[idx].hours=bill;
      arr[idx].desc=comment;
      setE(cid,yr,mo,arr);
      saveEntries();
      showToast('⏱ Updated to '+bill+'h'+(comment?' · '+comment:''));
      t.lastAutoBill=bill;
      render();
      if(t&&t.running)_startTimerTick(cid);
      return;
    }
  }
  // First auto-log — create new entry and store its id
  const entryId=uid();
  arr.unshift({id:entryId,date:d,hours:bill,desc:comment});
  setE(cid,yr,mo,arr);
  saveEntries();
  showToast('⏱ Auto-logged '+bill+'h'+(comment?' · '+comment:''));
  t.autoLogId=entryId;
  t.lastAutoBill=bill;
  render();
  if(t&&t.running)_startTimerTick(cid);
}

function _startTimerTick(cid){
  clearInterval(_timerIntervals[cid]);
  _timerIntervals[cid]=setInterval(()=>{
    const t=timerGet(cid);
    if(!t||!t.running){clearInterval(_timerIntervals[cid]);return;}
    const ms=timerElapsed(cid);
    // 8-hour safety check — probably forgotten
    if(ms>=8*60*60*1000&&!t._warnedForgotten){
      t._warnedForgotten=true;
      t.running=false;
      clearInterval(_timerIntervals[cid]);
      // Show a non-blocking modal warning
      S._forgottenTimer={cid};
      render();
      return;
    }
    const bill=timerBillable(ms);
    // Auto-log when a new billing threshold is crossed
    if(bill>0&&bill!==(t.lastAutoBill||0)){
      timerAutoLog(cid,bill);
      return; // render() called inside, tick will restart
    }
    const disp=document.getElementById('td-'+cid);
    const bl=document.getElementById('tbl-'+cid);
    if(!disp){clearInterval(_timerIntervals[cid]);return;}
    disp.textContent=timerFmt(ms);
    if(bl)bl.innerHTML=billLabel(ms,t.lastAutoBill);
  },1000);
}

  div.innerHTML=`
    <div style="background:var(--surface);border-radius:14px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.25)">
      <div style="font-size:32px;text-align:center;margin-bottom:12px">⏰</div>
      <h2 style="font-size:17px;font-weight:700;text-align:center;margin-bottom:8px">Are you still billing?</h2>
      <p style="font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.5;margin-bottom:20px">
        The timer for <strong>${name}</strong> has been running for 8 hours.<br>It may have been left on by accident.
      </p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button onclick="forgottenKeepGoing('${cid}')" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer">Yes, still billing — keep going</button>
        <button onclick="forgottenStopLog('${cid}')" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer">Stop &amp; log what's billable</button>
        <button onclick="forgottenDiscard('${cid}')" style="background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px;font-size:14px;cursor:pointer">Discard — it was forgotten</button>
      </div>
    </div>`;
  document.body.appendChild(div);
}

function _closeForgottenOverlay(){
  const el=document.getElementById('forgotten-overlay');
  if(el)el.remove();
  S._forgottenTimer=null;
}

function forgottenKeepGoing(cid){
  _closeForgottenOverlay();
  const t=timerGet(cid);
  if(!t)return;
  t._warnedForgotten=false; // reset so it can warn again after another 8h
  t.running=true;
  t.start=Date.now();
  _startTimerTick(cid);
  render();
}

function forgottenStopLog(cid){
  _closeForgottenOverlay();
  timerStop(cid);
}

function forgottenDiscard(cid){
  _closeForgottenOverlay();
  // Remove auto-logged entry if exists
  const t=timerGet(cid);
  if(t&&t.autoLogId){
    const d=today();const dp=d.split('-');
    const yr=parseInt(dp[0]),mo=parseInt(dp[1])-1;
    const arr=getE(cid,yr,mo);
    const idx=arr.findIndex(e=>e.id===t.autoLogId);
    if(idx>=0){arr.splice(idx,1);setE(cid,yr,mo,arr);saveEntries();}
  }
  if(S.timers)delete S.timers[cid];
  clearInterval(_timerIntervals[cid]);delete _timerIntervals[cid];
  showToast('Timer discarded');
  render();
}

function exportData(){
  const data={active:S.active,archived:S.archived,entries:S.entries,cfg:S.cfg,exportedAt:new Date().toISOString(),version:3};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`billable-hours-backup-${today()}.json`;a.click();
  URL.revokeObjectURL(url);
  try{localStorage.setItem('bht_last_backup',today());}catch(e){}
  const banner=document.getElementById('friday-reminder');
  if(banner)banner.remove();
}

function checkFridayReminder(){
  const now=new Date();
  if(now.getDay()!==5)return; // only on Friday
  const lastBackup=localStorage.getItem('bht_last_backup')||'';
  const thisWeekFriday=today();
  if(lastBackup===thisWeekFriday)return; // already downloaded today
  // Check if downloaded this week (Mon–Fri window)
  if(lastBackup){
    const last=new Date(lastBackup);
    const diff=(now-last)/(1000*60*60*24);
    if(diff<7)return; // backed up within last 7 days
  }
  showFridayReminder();
}

function showFridayReminder(){
  if(document.getElementById('friday-reminder'))return;
  const div=document.createElement('div');
  div.id='friday-reminder';
  div.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--blue);border-radius:10px;padding:11px 16px;min-width:320px;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;display:flex;align-items:center;gap:12px;';
  div.innerHTML=`
    <span style="font-size:18px">📥</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600;color:var(--text)">Friday Reminder</div>
      <div style="font-size:12px;color:var(--text-secondary)">Don't forget to download your backup JSON!</div>
    </div>
    <button onclick="exportData()" style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap">Download</button>
    <button onclick="document.getElementById('friday-reminder').remove()" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;line-height:1;padding:0 2px">×</button>
  `;
  document.body.appendChild(div);
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      S.active=data.active||data.customers||[];
      S.archived=data.archived||data.archivedCustomers||[];
      S.entries=data.entries||{};
      S.cfg={...S.cfg,...(data.cfg||data.settings||{})};
      saveActive();saveArchived();saveEntries();saveCfg();
      render();alert('Data imported successfully.');
    }catch(err){alert('Could not read this file. Make sure it is a valid export.');}
  };
  input.click();
}

function safeFilePart(v){
  return String(v||'export').replace(/[\\/:*?"<>|]/g,'-').replace(/\s+/g,' ').trim().slice(0,80)||'export';
}
function safeSheetName(v){
  return safeFilePart(v).replace(/[\[\]\*\/\\\?\:]/g,' ').trim().slice(0,31)||'Export';
}
function excelCol(n){
  let s='';n+=1;
  while(n>0){const r=(n-1)%26;s=String.fromCharCode(65+r)+s;n=Math.floor((n-1)/26);}
  return s;
}
function weekStartDate(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  const ws=new Date(d);
  ws.setDate(d.getDate()+diff);
  ws.setHours(0,0,0,0);
  return ws;
}

function exportCustomerHours(cid){
  const c=findC(cid);if(!c)return;
  const y=S.year,m=S.month;
  const entries=getE(cid,y,m).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const monthName=MONTHS[m];
  const hourRate=rate(c);
  const customerTarget=pN(c.target);

  const hasWeekend=entries.some(e=>{const d=new Date(e.date+'T00:00:00');const day=d.getDay();return day===0||day===6;});
  const dayDefs=[{day:1,name:'Monday'},{day:2,name:'Tuesday'},{day:3,name:'Wednesday'},{day:4,name:'Thursday'},{day:5,name:'Friday'}];
  if(hasWeekend){dayDefs.push({day:6,name:'Saturday'},{day:0,name:'Sunday'});}

  const groups={};
  entries.forEach(e=>{
    if(!e.date)return;
    const d=new Date(e.date+'T00:00:00');
    if(isNaN(d.getTime()))return;
    const ws=weekStartDate(e.date);
    const key=`${ws.getFullYear()}-${p2(ws.getMonth()+1)}-${p2(ws.getDate())}`;
    const day=d.getDay();
    if(!groups[key])groups[key]={weekStart:ws,days:{}};
    if(!groups[key].days[day])groups[key].days[day]={hours:0,comments:[]};
    groups[key].days[day].hours+=pN(e.hours);
    const desc=(e.desc||'').trim();
    if(desc)groups[key].days[day].comments.push(desc);
  });

  const grandByDay={};dayDefs.forEach(d=>grandByDay[d.day]=0);let grandTotal=0;
  const weekRows=[];
  Object.keys(groups).sort().forEach(key=>{
    const g=groups[key];let rowTotal=0;
    const days=dayDefs.map(d=>{
      const info=g.days[d.day]||{hours:0,comments:[]};
      const h=info.hours||0;rowTotal+=h;grandByDay[d.day]+=h;
      return {hours:h,comments:info.comments.join('; ')};
    });
    row4=rowTotal;grandTotal+=rowTotal;
    const label=g.weekStart.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    weekRows.push({label,days,total:rowTotal});
  });

  // ── XLSX builder ─────────────────────────────────────────────────────────────
  const remaining=customerTarget>0?Math.max(0,customerTarget-grandTotal):null;

  // Bold cell helper — SheetJS reads .s.font.bold when cellStyles:true
  const bc=(v)=>({v,t:typeof v==='number'?'n':'s',s:{font:{bold:true}}});
  const nc=(v)=>({v,t:typeof v==='number'?'n':'s'});
  const fh=(h)=>h>0?h+'h':'—';

  const aoa=[];
  aoa.push([nc('Billable Hours Report')]);
  aoa.push([bc(c.name)]);
  aoa.push([nc('Generated '+new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'}))]);
  aoa.push([]);
  aoa.push([]);

  // Weekly table header row
  const hdrRow=[bc('Week Starting'),bc('Total')];
  dayDefs.forEach(d=>{hdrRow.push(bc(d.name+' Hours'),bc(d.name+' Comments'));});
  aoa.push(hdrRow);

  // Data rows
  weekRows.forEach(wr=>{
    const r=[nc(wr.label),nc(fh(wr.total))];
    wr.days.forEach(d=>{r.push(nc(fh(d.hours)),nc(d.comments||''));});
    aoa.push(r);
  });

  // TOTAL row
  const totRow=[bc('TOTAL'),bc(fh(grandTotal))];
  dayDefs.forEach(d=>{totRow.push(bc(fh(grandByDay[d.day])),nc(''));});
  aoa.push(totRow);

  // Summary block
  aoa.push([]);
  aoa.push([bc('Summary')]);
  aoa.push([bc('Used Hours'),bc('Total Hours'),bc('Remaining Hours')]);
  aoa.push([nc(grandTotal),nc(customerTarget>0?customerTarget:'—'),nc(remaining!==null?remaining:'—')]);

  const ws=XLSX.utils.aoa_to_sheet(aoa,{skipHeader:true});
  ws['!cols']=[{wch:18},{wch:10},...dayDefs.flatMap(()=>[{wch:16},{wch:30}])];

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,safeSheetName(c.name));
  XLSX.writeFile(wb,`${safeFilePart(c.name)}-${monthName}-${y}-hours.xlsx`,{bookType:'xlsx',cellStyles:true});
  showToast('Excel exported');
}


load();
S.year=new Date().getFullYear();
S.month=new Date().getMonth();
render();
checkFridayReminder();
</script>
