<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billable Hours Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e8e6e0;
  --text:#1a1917;--text-secondary:#6b6760;--text-hint:#9e9b94;
  --blue:#2563eb;--blue-dark:#1d4ed8;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--purple:#7c3aed;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
h2{font-size:18px;font-weight:500}
button{font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;width:100%;outline:none;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;height:80px}
.page{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.header h1{font-size:24px;font-weight:500}
.header p{font-size:14px;color:var(--text-secondary);margin-top:3px}
.month-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 14px}
.month-nav button{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:20px;padding:0 4px;line-height:1}
.month-nav button:hover{color:var(--text)}
.month-nav span{font-weight:500;font-size:14px;min-width:100px;text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.s-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.s-value{font-size:20px;font-weight:500}
.s-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.stat-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.progress-wrap{background:var(--bg);border-radius:99px;height:10px;margin-bottom:8px;overflow:hidden}
.progress-bar{height:10px;border-radius:99px;transition:width 0.4s,background 0.4s}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-hint)}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-weight:500;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 14px;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--surface);color:var(--red);border:1px solid #fca5a5;border-radius:var(--radius);padding:7px 14px;display:inline-flex;align-items:center;gap:6px}
.btn-danger:hover{background:#fef2f2}
.btn-ghost{background:none;border:none;color:var(--text-secondary);padding:4px;display:inline-flex;align-items:center;border-radius:6px}
.btn-ghost:hover{color:var(--text);background:var(--bg)}
.customers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.customer-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;cursor:pointer;transition:border-color 0.15s;position:relative}
.customer-card:hover{border-color:var(--blue)}
.customer-card.archived-card{opacity:0.7;border-style:dashed}
.card-x{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:none;border:none;color:var(--text-hint);font-size:16px;display:none;align-items:center;justify-content:center;line-height:1;padding:0;cursor:pointer}
.card-x:hover{color:var(--red);background:#fef2f2}
.customer-card:hover .card-x{display:flex}
.c-name-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.c-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0}
.c-dot.archived{background:var(--text-hint)}
.c-name{font-weight:500}
.c-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.c-lbl{color:var(--text-secondary)}.c-val{font-weight:500}.c-val-green{color:var(--green);font-weight:500}
.target-bar{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.target-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-hint);margin-bottom:5px}
.mini-bar-wrap{background:var(--bg);border-radius:99px;height:5px;overflow:hidden}
.mini-bar{height:5px;border-radius:99px;transition:width 0.3s}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.detail-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:500}
.detail-month{font-size:14px;color:var(--text-secondary);font-weight:400}
.entry-group{margin-bottom:4px}
.entry-date-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border)}
.entry-date-lbl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text-secondary)}
.entry-date-sum{display:flex;gap:14px;font-size:13px}
.entry-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.entry-item:last-child{border-bottom:none}
.entry-hrs{font-size:13px;font-weight:500}
.entry-rev{font-size:13px;color:var(--green);margin-left:8px}
.entry-desc{font-size:12px;color:var(--text-secondary);margin-top:3px}
.entry-actions{display:flex;gap:4px;flex-shrink:0;margin-left:12px}
.empty-state{text-align:center;padding:2rem 0;color:var(--text-secondary);font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:420px;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:5px}
.field-hint{font-size:12px;color:var(--text-hint);margin-top:4px}
.stepper{display:flex;align-items:center;justify-content:center;gap:20px;margin:8px 0 12px}
.step-btn{background:var(--bg);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.step-btn:hover{background:var(--border)}
.h-big{font-size:30px;font-weight:500;text-align:center;min-width:60px}
.h-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:2px}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.quick-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px;font-size:13px;cursor:pointer;color:var(--text)}
.quick-btn:hover{border-color:var(--blue);color:var(--blue)}
.quick-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.modal-actions button{flex:1;padding:10px;border-radius:var(--radius);font-size:14px}
.btn-cancel-m{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-ok-m{background:var(--blue);color:#fff;border:none;font-weight:500}
.btn-ok-m:hover{background:var(--blue-dark)}
.cpill{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:var(--radius);padding:10px 12px;font-size:14px;border:1px solid var(--border)}
.accordion{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.5rem;cursor:pointer;user-select:none}
.acc-hdr:hover{background:var(--bg)}
.acc-hdr-left{display:flex;align-items:center;gap:12px}
.acc-icon{width:38px;height:38px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0}
.acc-title{font-weight:500;font-size:15px}
.acc-sub{font-size:13px;color:var(--text-secondary);margin-top:1px}
.acc-chev{color:var(--text-secondary);transition:transform 0.2s;display:flex;align-items:center}
.acc-chev.open{transform:rotate(180deg)}
.acc-body{border-top:1px solid var(--border);padding:1.5rem;display:none}
.acc-body.open{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.settings-grid .field{margin-bottom:0}
.data-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius);padding:12px 14px;display:flex;gap:10px;margin-bottom:1.25rem;align-items:flex-start}
.data-warn p{font-size:13px;color:#92400e}
.data-warn strong{color:#b45309}
.data-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.data-card{border-radius:var(--radius);padding:1.25rem;cursor:pointer;text-align:center}
.dc-exp{border:1.5px dashed #93c5fd;background:#f0f7ff}.dc-exp:hover{background:#e0efff}
.dc-imp{border:1.5px dashed #6ee7b7;background:#f0fdf8}.dc-imp:hover{background:#dcfdf0}
.dc-title{font-weight:500;font-size:14px;margin-top:6px;margin-bottom:2px}
.dc-exp .dc-title{color:var(--blue)}.dc-imp .dc-title{color:var(--green)}
.dc-sub{font-size:12px;color:var(--text-secondary)}
.data-notes{list-style:none;padding:0}
.data-notes li{font-size:13px;color:var(--text-secondary);padding:2px 0}
.data-notes li::before{content:"· ";color:var(--text-hint)}
.sec-label{font-size:13px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px}
.divider{border-top:1px solid var(--border);margin:1.25rem 0}
svg.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const QUICK=[0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8];
const GOAL=125;
const SK={C:'bht_customers',A:'bht_archived',E:'bht_entries',S:'bht_settings'};

const CURR={
  HUF:{label:'HUF',symbol:'Ft',locale:'hu-HU'},
  EUR:{label:'EUR',symbol:'€',locale:'de-DE'},
  GBP:{label:'GBP',symbol:'£',locale:'en-GB'},
  PLN:{label:'PLN',symbol:'zł',locale:'pl-PL'},
  USD:{label:'USD',symbol:'$',locale:'en-US'},
};

const ic={
  clock:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  dollar:'<svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  users:'<svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  calendar:'<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  plus:'<svg class="ic" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  edit:'<svg class="ic" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  trash:'<svg class="ic" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  back:'<svg class="ic" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>',
  download:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  upload:'<svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
  x:'<svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  gear:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  warn:'<svg class="ic" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
};

function today(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function p2(n){return String(n).padStart(2,'0')}
function mk(y,m){return `${y}-${p2(m+1)}`}
function fmtDate(s){const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}
function fmtMoney(n){const c=CURR[S.cfg.currency]||CURR.HUF;return Number(n).toLocaleString(c.locale)+' '+c.label}
function pN(s){return parseFloat(s)||0}
function uid(){return 'x'+Math.random().toString(36).slice(2)}
function pColor(pct){const t=Math.min(1,pct/100);return `rgb(${Math.round(134-t*101)},${Math.round(169+t*43)},${Math.round(91-t*57)})`}

// ── State ──────────────────────────────────────────────────────────────────
let S={
  view:'dashboard',
  year:new Date().getFullYear(),
  month:new Date().getMonth(),
  selectedId:null,
  modal:null,
  mh:0.5,
  active:[],    // active customers
  archived:[],  // deleted customers — kept for history
  entries:{},   // key: "customerId::YYYY-MM" → [{id,date,hours,desc}]
  cfg:{defaultRate:0,currency:'HUF',baseSalary:0},
};

// ── Persistence ────────────────────────────────────────────────────────────
function load(){
  try{const r=localStorage.getItem(SK.C);if(r)S.active=JSON.parse(r);}catch(e){S.active=[];}
  try{const r=localStorage.getItem(SK.A);if(r)S.archived=JSON.parse(r);}catch(e){S.archived=[];}
  try{const r=localStorage.getItem(SK.E);if(r)S.entries=JSON.parse(r);}catch(e){S.entries={};}
  try{const r=localStorage.getItem(SK.S);if(r)S.cfg={...S.cfg,...JSON.parse(r)};}catch(e){}
}
function saveActive(){try{localStorage.setItem(SK.C,JSON.stringify(S.active));}catch(e){}}
function saveArchived(){try{localStorage.setItem(SK.A,JSON.stringify(S.archived));}catch(e){}}
function saveEntries(){try{localStorage.setItem(SK.E,JSON.stringify(S.entries));}catch(e){}}
function saveCfg(){try{localStorage.setItem(SK.S,JSON.stringify(S.cfg));}catch(e){}}

// ── Helpers ────────────────────────────────────────────────────────────────
// Find a customer in BOTH active and archived lists
function findC(id){return S.active.find(c=>c.id===id)||S.archived.find(c=>c.id===id)||null;}
function isArchived(id){return !!S.archived.find(c=>c.id===id);}
function eKey(cid,y,m){return `${cid}::${mk(y,m)}`}
function getE(cid,y,m){return S.entries[eKey(cid,y,m)]||[];}
function setE(cid,y,m,arr){S.entries[eKey(cid,y,m)]=arr;}
function rate(c){return c.rate||S.cfg.defaultRate||0;}
function cHours(cid){return getE(cid,S.year,S.month).reduce((s,e)=>s+e.hours,0);}
function cRev(cid){const c=findC(cid);return c?cHours(cid)*rate(c):0;}

// Customers visible for the currently displayed month:
// - current month → only active customers
// - past/future month → active + archived, but only those with entries in that month
function visibleCustomers(){
  const now=new Date();
  const isCurrent=(S.year===now.getFullYear()&&S.month===now.getMonth());
  if(isCurrent) return S.active;
  const all=[...S.active,...S.archived];
  return all.filter(c=>getE(c.id,S.year,S.month).length>0);
}

// ── Render dispatcher ──────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(S.modal){renderModal(app);return;}
  if(S.view==='detail') renderDetail(app);
  else renderDashboard(app);
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(app){
  const vc=visibleCustomers();
  const th=vc.reduce((s,c)=>s+cHours(c.id),0);
  const tr=vc.reduce((s,c)=>s+cRev(c.id),0);
  const te=vc.reduce((s,c)=>s+getE(c.id,S.year,S.month).length,0);
  const pct=Math.min(100,th/GOAL*100);
  const base=S.cfg.baseSalary||0;

  app.innerHTML=`
<div class="page">
  <div class="header">
    <div>
      <h1>Billable hours tracker</h1>
      <p>Track your time and manage your clients</p>
    </div>
    <div class="month-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <span>${MONTHS[S.month]} ${S.year}</span>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div><div class="s-label">Total hours</div><div class="s-value">${th.toFixed(1)}</div></div>
      <div class="stat-icon" style="background:#eff6ff;color:#2563eb">${ic.clock}</div>
    </div>
    <div class="stat-card">
      <div style="min-width:0;flex:1">
        <div class="s-label">Billable revenue</div>
        <div class="s-value" style="font-size:${tr>=10000?'15px':'18px'}">${fmtMoney(tr)}</div>
        ${base>0?`<div class="s-sub">+ ${fmtMoney(base)} base = <strong>${fmtMoney(tr+base)}</strong> total</div>`:''}
      </div>
      <div class="stat-icon" style="background:#f0fdf4;color:#16a34a">${ic.dollar}</div>
    </div>
    <div class="stat-card">
      <div><div class="s-label">Active customers</div><div class="s-value">${S.active.length}</div></div>
      <div class="stat-icon" style="background:#f5f3ff;color:#7c3aed">${ic.users}</div>
    </div>
    <div class="stat-card">
      <div><div class="s-label">Time entries</div><div class="s-value">${te}</div></div>
      <div class="stat-icon" style="background:#fffbeb;color:#d97706">${ic.calendar}</div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-header" style="margin-bottom:1rem">
      <span style="font-weight:500">Monthly progress</span>
      <span style="font-size:13px;color:var(--text-secondary)">${th.toFixed(1)} / ${GOAL} hours (${pct.toFixed(1)}%)</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${pColor(pct)}"></div></div>
    <div class="progress-labels"><span>0h</span><span>${GOAL}h target</span></div>
  </div>

  <div class="section-header" style="margin-bottom:1rem">
    <h2>Customers</h2>
    <button class="btn-primary" onclick="openAddCustomer()">${ic.plus} Add customer</button>
  </div>
  ${vc.length===0
    ?'<div class="empty-state" style="padding:3rem 0">No customers yet. Add your first customer to get started.</div>'
    :`<div class="customers-grid">${vc.map(c=>renderCCard(c)).join('')}</div>`}

  <div style="margin-top:2rem">
    <div class="accordion">
      <div class="acc-hdr" onclick="toggleAcc('gs')">
        <div class="acc-hdr-left">
          <div class="acc-icon">${ic.gear}</div>
          <div>
            <div class="acc-title">General settings</div>
            <div class="acc-sub">Rate, currency, salary &amp; data backup</div>
          </div>
        </div>
        <div class="acc-chev" id="chev-gs"><svg class="ic" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
      </div>
      <div class="acc-body" id="body-gs">
        <p class="sec-label">Billing</p>
        <div class="settings-grid">
          <div class="field">
            <label>Default hourly rate</label>
            <input id="s-rate" type="number" min="0" value="${S.cfg.defaultRate||''}" placeholder="e.g. 1800" oninput="liveCfg()">
            <div class="field-hint">Applied to all customers</div>
          </div>
          <div class="field">
            <label>Currency</label>
            <select id="s-cur" onchange="liveCfg()">
              ${Object.keys(CURR).map(k=>`<option value="${k}"${S.cfg.currency===k?' selected':''}>${CURR[k].label} (${CURR[k].symbol})</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field" style="max-width:260px;margin-bottom:0">
          <label>Base salary (monthly)</label>
          <input id="s-sal" type="number" min="0" value="${S.cfg.baseSalary||''}" placeholder="e.g. 500000" oninput="liveCfg()">
          <div class="field-hint">Added to billable revenue to show total income</div>
        </div>
        <div class="divider"></div>
        <p class="sec-label">Data management</p>
        <div class="data-warn">
          <svg class="ic" viewBox="0 0 24 24" style="color:#d97706;flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <p><strong>Important: back up your data.</strong> Your data is stored locally in your browser. Export regularly to prevent loss when clearing browser data or switching devices.</p>
        </div>
        <div class="data-cards">
          <div class="data-card dc-exp" onclick="exportData()">
            <svg class="ic" viewBox="0 0 24 24" style="color:#2563eb;width:22px;height:22px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <div class="dc-title">Export data</div><div class="dc-sub">Download backup file</div>
          </div>
          <div class="data-card dc-imp" onclick="importData()">
            <svg class="ic" viewBox="0 0 24 24" style="color:#16a34a;width:22px;height:22px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div class="dc-title">Import data</div><div class="dc-sub">Restore from backup</div>
          </div>
        </div>
        <ul class="data-notes">
          <li>Export saves all customers, archived customers, time entries and settings</li>
          <li>Import replaces all current data with the backup file</li>
          <li>Keep backup files in a safe location (cloud storage, email, etc.)</li>
        </ul>
      </div>
    </div>
  </div>
</div>`;
}

function renderCCard(c){
  const h=cHours(c.id),rev=cRev(c.id),n=getE(c.id,S.year,S.month).length;
  const archived=isArchived(c.id);
  let bar='';
  if(c.target){
    const p=Math.min(100,h/c.target*100),left=Math.max(0,c.target-h);
    bar=`<div class="target-bar">
      <div class="target-labels"><span>${h.toFixed(1)}h used</span><span>${left.toFixed(1)}h left of ${c.target}h</span></div>
      <div class="mini-bar-wrap"><div class="mini-bar" style="width:${p}%;background:${pColor(p)}"></div></div>
    </div>`;
  }
  return `<div class="customer-card${archived?' archived-card':''}" onclick="openDetail('${c.id}')">
    ${archived?'':`<button class="card-x" onclick="event.stopPropagation();archiveCustomer('${c.id}')" title="Remove customer">&#x2715;</button>`}
    <div class="c-name-row"><div class="c-dot${archived?' archived':''}"></div><span class="c-name">${c.name}${archived?' <span style="font-size:11px;color:var(--text-hint)">(archived)</span>':''}</span></div>
    <div class="c-row"><span class="c-lbl">Hours this month:</span><span class="c-val">${h.toFixed(1)}</span></div>
    <div class="c-row"><span class="c-lbl">Revenue:</span><span class="c-val-green">${fmtMoney(rev)}</span></div>
    <div class="c-row"><span class="c-lbl">Hourly rate:</span><span class="c-val">${fmtMoney(rate(c))}/hr</span></div>
    <div class="c-row"><span class="c-lbl">Time entries:</span><span class="c-val">${n}</span></div>
    ${bar}
  </div>`;
}

// ── Detail ─────────────────────────────────────────────────────────────────
function renderDetail(app){
  const c=findC(S.selectedId);
  if(!c){S.view='dashboard';render();return;}
  const arch=isArchived(c.id);
  const entries=getE(c.id,S.year,S.month);
  const h=entries.reduce((s,e)=>s+e.hours,0);
  const r=rate(c);
  const rev=h*r;

  let tBar='';
  if(c.target){
    const p=Math.min(100,h/c.target*100),left=Math.max(0,c.target-h);
    tBar=`<div class="section-card" style="margin-bottom:1.5rem">
      <div class="section-header" style="margin-bottom:1rem">
        <span style="font-weight:500">Monthly hours target</span>
        <span style="font-size:13px;color:var(--text-secondary)">${h.toFixed(1)} / ${c.target}h (${p.toFixed(1)}%)</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${p}%;background:${pColor(p)}"></div></div>
      <div class="progress-labels"><span>0h</span><span>${Math.max(0,c.target-h).toFixed(1)}h remaining</span></div>
    </div>`;
  }

  const byDate={};
  entries.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const entriesHtml=dates.length===0
    ?'<div class="empty-state">No entries yet this month.</div>'
    :dates.map(d=>{
      const de=byDate[d],dh=de.reduce((s,e)=>s+e.hours,0);
      return `<div class="entry-group">
        <div class="entry-date-hdr">
          <span class="entry-date-lbl">${ic.calendar} ${fmtDate(d)}</span>
          <span class="entry-date-sum"><span>${dh.toFixed(1)} hours</span><span style="color:var(--green)">${fmtMoney(dh*r)}</span></span>
        </div>
        ${de.map(e=>`<div class="entry-item">
          <div>
            <span class="entry-hrs">${e.hours}h</span><span class="entry-rev">${fmtMoney(e.hours*r)}</span>
            ${e.desc?`<div class="entry-desc">${e.desc}</div>`:''}
          </div>
          <div class="entry-actions">
            ${arch?'':`<button class="btn-ghost" onclick="openEditEntry('${c.id}','${e.id}')">${ic.edit}</button>`}
            ${arch?'':`<button class="btn-ghost" onclick="deleteEntry('${c.id}','${e.id}')">${ic.trash}</button>`}
          </div>
        </div>`).join('')}
      </div>`;
    }).join('');

  app.innerHTML=`
<div class="page">
  <div class="detail-header">
    <button class="btn-secondary" onclick="goBack()">${ic.back} Back</button>
    <div class="detail-title">
      <div class="c-dot${arch?' archived':''}"></div>
      ${c.name}
      ${arch?'<span style="font-size:13px;color:var(--text-hint);border:1px solid var(--border);padding:2px 8px;border-radius:99px">Archived</span>':''}
      <span class="detail-month">&middot; ${MONTHS[S.month]} ${S.year}</span>
    </div>
    <div style="display:flex;gap:8px">
      ${arch?'':`<button class="btn-secondary" onclick="openEditCustomer('${c.id}')">${ic.edit} Edit</button>`}
    </div>
  </div>
  <div class="stats-grid" style="margin-bottom:1.5rem">
    <div class="stat-card"><div><div class="s-label">Hours this month</div><div class="s-value">${h.toFixed(1)}</div></div><div class="stat-icon" style="background:#eff6ff;color:#2563eb">${ic.clock}</div></div>
    <div class="stat-card"><div><div class="s-label">Revenue this month</div><div class="s-value" style="font-size:15px">${fmtMoney(rev)}</div></div><div class="stat-icon" style="background:#f0fdf4;color:#16a34a">${ic.dollar}</div></div>
    <div class="stat-card"><div><div class="s-label">Hourly rate</div><div class="s-value" style="font-size:15px">${fmtMoney(r)}/hr</div></div><div class="stat-icon" style="background:#f5f3ff;color:#7c3aed">${ic.dollar}</div></div>
  </div>
  ${tBar}
  <div class="section-card">
    <div class="section-header">
      <h2>Time entries</h2>
      ${arch?'':`<button class="btn-primary" onclick="openAddEntry('${c.id}')">${ic.plus} Add time entry</button>`}
    </div>
    ${entriesHtml}
  </div>
</div>`;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function renderModal(app){
  const m=S.modal;
  let inner='';
  if(m.type==='customer'){
    const c=m.id?findC(m.id):{};
    inner=`<div class="modal">
      <div class="modal-header"><h2>${m.id?'Edit customer':'Add customer'}</h2><button class="btn-ghost" onclick="closeModal()">${ic.x}</button></div>
      <div class="field"><label>Customer name</label><input id="m-name" type="text" value="${c.name||''}" placeholder="Customer name"></div>
      <div class="field"><label>Monthly hours target (optional)</label><input id="m-target" type="number" value="${c.target||''}" min="0" placeholder="e.g. 10 — leave blank if none"></div>
      <div class="modal-actions">
        <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
        <button class="btn-ok-m" onclick="saveCustomer('${m.id||''}')">Save</button>
      </div>
    </div>`;
  } else if(m.type==='entry'){
    const c=findC(m.cid),r=rate(c);
    const entry=m.eid?getE(m.cid,S.year,S.month).find(e=>e.id===m.eid):{hours:0.5,date:today(),desc:''};
    const h=S.mh;
    inner=`<div class="modal">
      <div class="modal-header"><h2>${m.eid?'Edit time entry':'Add time entry'}</h2><button class="btn-ghost" onclick="closeModal()">${ic.x}</button></div>
      <div class="field"><label>Customer</label><div class="cpill"><div class="c-dot"></div>${c.name} &middot; ${fmtMoney(r)}/hr</div></div>
      <div class="field"><label>Date</label><input id="m-date" type="date" value="${entry.date}"></div>
      <div class="field"><label>Hours</label>
        <div class="stepper">
          <button class="step-btn" onclick="adjH(-0.5)">&#8722;</button>
          <div><div class="h-big" id="hbig">${h}</div><div class="h-sub" id="hrev">${fmtMoney(h*r)}</div></div>
          <button class="step-btn" onclick="adjH(0.5)">+</button>
        </div>
        <div class="quick-grid">${QUICK.map(q=>`<button class="quick-btn${h===q?' active':''}" onclick="setH(${q})">${q}h</button>`).join('')}</div>
      </div>
      <div class="field"><label>Description (optional)</label><textarea id="m-desc" placeholder="What did you work on?">${entry.desc||''}</textarea></div>
      <div class="modal-actions">
        <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
        <button class="btn-ok-m" onclick="saveEntry('${m.cid}','${m.eid||''}')">${m.eid?'Save changes':'Add entry'}</button>
      </div>
    </div>`;
  }
  app.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">${inner}</div>`;
}

// ── Actions ────────────────────────────────────────────────────────────────
function adjH(d){
  const r=rate(findC(S.modal.cid));
  S.mh=Math.max(0.5,Math.round((S.mh+d)*2)/2);
  document.getElementById('hbig').textContent=S.mh;
  document.getElementById('hrev').textContent=fmtMoney(S.mh*r);
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===S.mh));
}
function setH(h){
  const r=rate(findC(S.modal.cid));
  S.mh=h;
  document.getElementById('hbig').textContent=h;
  document.getElementById('hrev').textContent=fmtMoney(h*r);
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===h));
}
function toggleAcc(id){
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('chev-'+id).classList.toggle('open');
}
function liveCfg(){
  S.cfg.defaultRate=pN(document.getElementById('s-rate').value);
  S.cfg.currency=document.getElementById('s-cur').value;
  S.cfg.baseSalary=pN(document.getElementById('s-sal').value);
  saveCfg();
}
function openAddCustomer(){S.modal={type:'customer'};render();}
function openEditCustomer(id){S.modal={type:'customer',id};render();}
function openAddEntry(cid){S.mh=0.5;S.modal={type:'entry',cid};render();}
function openEditEntry(cid,eid){
  const e=getE(cid,S.year,S.month).find(x=>x.id===eid);
  S.mh=e?e.hours:0.5;S.modal={type:'entry',cid,eid};render();
}
function closeModal(){S.modal=null;render();}

function saveCustomer(id){
  const name=document.getElementById('m-name').value.trim();
  const target=pN(document.getElementById('m-target').value)||null;
  if(!name) return;
  if(id){
    const i=S.active.findIndex(c=>c.id===id);
    if(i>=0)S.active[i]={...S.active[i],name,target};
  } else {
    S.active.push({id:uid(),name,target});
  }
  saveActive();S.modal=null;render();
}

function saveEntry(cid,eid){
  const date=document.getElementById('m-date').value;
  const hours=S.mh;
  const desc=document.getElementById('m-desc').value.trim();
  const arr=getE(cid,S.year,S.month);
  if(eid){const i=arr.findIndex(e=>e.id===eid);if(i>=0)arr[i]={...arr[i],date,hours,desc};}
  else arr.push({id:uid(),date,hours,desc});
  setE(cid,S.year,S.month,arr);
  saveEntries();S.modal=null;render();
}

function deleteEntry(cid,eid){
  if(!confirm('Delete this entry?')) return;
  setE(cid,S.year,S.month,getE(cid,S.year,S.month).filter(e=>e.id!==eid));
  saveEntries();render();
}

function archiveCustomer(id){
  const c=S.active.find(x=>x.id===id);
  if(!c) return;
  S.active=S.active.filter(x=>x.id!==id);
  S.archived.push(c);
  const curKey=mk(S.year,S.month);
  Object.keys(S.entries).forEach(k=>{
    if(k.startsWith(id+'::')&&k.split('::')[1]>=curKey) delete S.entries[k];
  });
  saveActive();saveArchived();saveEntries();
  S.view='dashboard';S.selectedId=null;render();
}

function openDetail(id){S.selectedId=id;S.view='detail';render();}
function goBack(){S.view='dashboard';S.selectedId=null;render();}
function prevMonth(){if(S.month===0){S.month=11;S.year--;}else S.month--;render();}
function nextMonth(){if(S.month===11){S.month=0;S.year++;}else S.month++;render();}

function exportData(){
  const data={active:S.active,archived:S.archived,entries:S.entries,cfg:S.cfg,exportedAt:new Date().toISOString(),version:3};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`billable-hours-backup-${today()}.json`;a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      // Support both old format (customers/archivedCustomers/settings) and new (active/archived/cfg)
      S.active=data.active||data.customers||[];
      S.archived=data.archived||data.archivedCustomers||[];
      S.entries=data.entries||{};
      S.cfg={...S.cfg,...(data.cfg||data.settings||{})};
      saveActive();saveArchived();saveEntries();saveCfg();
      render();alert('Data imported successfully.');
    }catch(err){alert('Could not read this file. Make sure it is a valid export.');}
  };
  input.click();
}

load();
S.year=new Date().getFullYear();
S.month=new Date().getMonth();
render();
</script>
</body>
</html>
